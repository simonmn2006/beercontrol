<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KegHero | High-Performance Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <!-- MQTT.js library -->
    <script src="https://unpkg.com/mqtt@5.3.4/dist/mqtt.min.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <!-- Top Gauges Section -->
        <header class="gauges-header">
            <div class="gauge-container co2-gauge">
                <div class="gauge-label">CO2 PRESSURE</div>
                <div class="gauge-display">
                    <svg viewBox="0 0 100 100" class="circular-gauge">
                        <circle cx="50" cy="50" r="45" class="gauge-bg"></circle>
                        <circle cx="50" cy="50" r="45" class="gauge-progress" id="co2-progress-bar"></circle>
                    </svg>
                    <div class="gauge-value">
                        <span id="co2-value">12.5</span>
                        <small>PSI</small>
                    </div>
                </div>
                <div class="gauge-status">
                    <span class="status-dot online"></span>
                    <span id="co2-status">STABLE</span>
                </div>
            </div>

            <div class="gauge-container temp-gauge">
                <div class="gauge-label">TEMPERATURE</div>
                <div class="temp-display">
                    <span id="temp-value">3.8</span>
                    <span class="unit">°C</span>
                    <div class="temp-icon">
                        <svg class="ice-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M11,2V4.07C7.38,4.53 4.53,7.38 4.07,11H2V13H4.07C4.53,16.62 7.38,19.47 11,19.93V22H13V19.93C16.62,19.47 19.47,16.62 19.93,13H22V11H19.93C19.47,7.38 16.62,4.53 13,4.07V2H11M11,6.08V9H13V6.08C15.62,6.5 17.5,8.38 17.92,11H15V13H17.92C17.5,15.62 15.62,17.5 13,17.92V15H11V17.92C8.38,17.5 6.5,15.62 6.08,13H9V11H6.08C6.5,8.38 8.38,6.5 11,6.08Z" /></svg>
                    </div>
                </div>
            </div>
        </header>

        <!-- Middle Keg Physics Section -->
        <main class="keg-section">
            <div class="keg-glass">
                <canvas id="beer-canvas"></canvas>
                <div class="keg-overlay"></div>
                <div class="keg-logo">
                    <img src="https://i.ibb.co/vzN4K5D/brewmaster-logo.png" alt="Brewmaster Select IPA" id="beer-logo">
                </div>
            </div>
        </main>

        <!-- Bottom Flow Section -->
        <footer class="flow-footer">
            <div class="flow-info">
                <div class="label">FLOW RATE</div>
                <div class="flow-rate">
                    <span class="tap-icon">🚰</span>
                    <span id="flow-value">1.45</span>
                    <span class="unit">LITERS/MIN</span>
                </div>
                <div class="sub-label">POURED</div>
            </div>

            <!-- Dynamic Alert Bar -->
            <div class="alert-bar" id="status-alert">
                <div class="alert-content">
                    <span class="alert-icon">⚠️</span>
                    <span class="alert-text">KEG STATUS: LOW LEVEL - PLEASE REPLACE SOON!</span>
                </div>
                <div class="alert-detail">(<span id="liters-remaining">8</span> LITERS REMAINING)</div>
            </div>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="shader.js"></script>
    <script src="mqtt_service.js"></script>
</body>
</html>
