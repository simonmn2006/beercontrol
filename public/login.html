<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeerControl — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#0e0f11;--bg1:#141518;--bg2:#1a1c20;--bg3:#21242a;--bg4:#2a2e36;
  --border:#2e3240;--border2:#3a3f50;
  --amber:#f0a500;--amber-dim:rgba(240,165,0,.12);
  --text1:#eceef2;--text2:#9ba3b8;--text3:#5c6378;
  --green:#22c97a;--red:#e84b4b;--red-dim:rgba(232,75,75,.12);
  --font-head:'Barlow Condensed',sans-serif;
  --font-body:'Barlow',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg0);color:var(--text1);font-family:var(--font-body);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
body::before{
  content:'';position:absolute;inset:0;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),
                   linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:40px 40px;opacity:.3;pointer-events:none;
}
.box{
  position:relative;z-index:1;width:420px;
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:14px;overflow:hidden;
  box-shadow:0 24px 64px rgba(0,0,0,.6);
}
.top{
  padding:32px 32px 24px;text-align:center;
  border-bottom:1px solid var(--border);
  background:linear-gradient(160deg,var(--bg3) 0%,var(--bg2) 100%);
}
.logo{
  width:56px;height:56px;background:var(--amber);border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:28px;
  margin:0 auto 14px;box-shadow:0 4px 20px rgba(240,165,0,.3);
}
.title{font-family:var(--font-head);font-size:26px;font-weight:700;letter-spacing:.5px}
.subtitle{font-size:13px;color:var(--text3);margin-top:4px}
.body{padding:28px 32px 32px}
.lang-row{display:flex;gap:6px;margin-bottom:22px;justify-content:center;flex-wrap:wrap}
.lang-btn{
  padding:5px 10px;border-radius:6px;font-size:12px;font-family:var(--font-mono);
  cursor:pointer;border:1px solid var(--border);background:transparent;
  color:var(--text3);transition:all .15s;display:flex;align-items:center;gap:5px;
}
.lang-btn:hover{border-color:var(--border2);color:var(--text2)}
.lang-btn.active{background:var(--amber-dim);color:var(--amber);border-color:rgba(240,165,0,.3)}
.lbl{font-size:11px;color:var(--text3);font-family:var(--font-mono);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px;display:block}
.inp{
  display:block;width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:6px;color:var(--text1);font-family:var(--font-body);font-size:14px;
  padding:10px 14px;outline:none;transition:border-color .15s;margin-bottom:14px;
}
.inp:focus{border-color:var(--amber)}
.inp.err{border-color:var(--red)}
.btn{
  width:100%;background:var(--amber);color:var(--bg0);border:none;border-radius:6px;
  font-family:var(--font-head);font-size:17px;font-weight:700;letter-spacing:.5px;
  padding:11px;cursor:pointer;transition:background .15s;margin-top:6px;
}
.btn:hover{background:#fdb827}
.btn:disabled{background:var(--bg4);color:var(--text3);cursor:not-allowed}
.error-box{
  background:var(--red-dim);border:1px solid rgba(232,75,75,.25);border-radius:6px;
  padding:10px 14px;font-size:13px;color:var(--red);margin-top:12px;display:none;text-align:center;
}
.hint{text-align:center;margin-top:16px;font-size:11px;color:var(--text3);line-height:1.7;font-family:var(--font-mono)}
.spinner{display:none;width:16px;height:16px;border:2px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="box">
  <div class="top">
    <div class="logo">🍺</div>
    <div class="title">BeerControl</div>
    <div class="subtitle" id="tagline">Draft Beer Management Platform</div>
  </div>
  <div class="body">
    <div class="lang-row" id="langRow">
      <button class="lang-btn active" onclick="setLang('en',this)">🇬🇧 EN</button>
      <button class="lang-btn" onclick="setLang('de',this)">🇩🇪 DE</button>
      <button class="lang-btn" onclick="setLang('es',this)">🇪🇸 ES</button>
      <button class="lang-btn" onclick="setLang('it',this)">🇮🇹 IT</button>
      <button class="lang-btn" onclick="setLang('el',this)">🇬🇷 ΕΛ</button>
    </div>

    <label class="lbl" id="lbl-email">Username</label>
    <input class="inp" type="text" id="email" placeholder="admin" autocomplete="username">

    <label class="lbl" id="lbl-pass">Password</label>
    <input class="inp" type="password" id="pass" placeholder="••••••••" autocomplete="current-password">

    <button class="btn" id="loginBtn" onclick="doLogin()">
      <span id="btnText">Sign In</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div class="error-box" id="errBox"></div>

    <div class="hint">
      admin / admin
    </div>
  </div>
</div>

<script>
const TR = {
  en:{ tagline:'Draft Beer Management Platform', email:'Email', password:'Password', signin:'Sign In', invalid_credentials:'Invalid email or password.', account_disabled:'This account has been disabled.', restaurant_suspended:'Your restaurant account is suspended. Please contact support.' },
  de:{ tagline:'Fassbier-Management-Plattform', email:'E-Mail', password:'Passwort', signin:'Anmelden', invalid_credentials:'Ungültige E-Mail oder Passwort.', account_disabled:'Dieses Konto wurde deaktiviert.', restaurant_suspended:'Ihr Restaurant-Konto ist gesperrt.' },
  es:{ tagline:'Plataforma de Gestión de Cerveza de Barril', email:'Correo electrónico', password:'Contraseña', signin:'Iniciar sesión', invalid_credentials:'Correo o contraseña incorrectos.', account_disabled:'Esta cuenta ha sido deshabilitada.', restaurant_suspended:'Su cuenta de restaurante está suspendida.' },
  it:{ tagline:'Piattaforma di Gestione Birra alla Spina', email:'Email', password:'Password', signin:'Accedi', invalid_credentials:'Email o password non validi.', account_disabled:'Questo account è stato disabilitato.', restaurant_suspended:'Il vostro ristorante è sospeso.' },
  el:{ tagline:'Πλατφόρμα Διαχείρισης Μπύρας Βαρελιού', email:'Email', password:'Κωδικός', signin:'Σύνδεση', invalid_credentials:'Λανθασμένο email ή κωδικός.', account_disabled:'Αυτός ο λογαριασμός έχει απενεργοποιηθεί.', restaurant_suspended:'Ο λογαριασμός του εστιατορίου σας έχει ανασταλεί.' },
};
let lang = localStorage.getItem('bc_lang') || 'en';

function setLang(l, el) {
  lang = l;
  localStorage.setItem('bc_lang', l);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  applyLang();
}

function applyLang() {
  const t = TR[lang] || TR.en;
  document.getElementById('tagline').textContent   = t.tagline;
  document.getElementById('lbl-email').textContent = t.email;
  document.getElementById('lbl-pass').textContent  = t.password;
  document.getElementById('btnText').textContent   = t.signin;
  // activate the right button
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.includes(lang.toUpperCase()) || b.onclick.toString().includes(`'${lang}'`));
  });
}

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  const errBox = document.getElementById('errBox');
  const btn    = document.getElementById('loginBtn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');
  const t = TR[lang] || TR.en;

  errBox.style.display = 'none';
  document.getElementById('email').classList.remove('err');
  document.getElementById('pass').classList.remove('err');

  if (!email || !pass) return;

  btn.disabled = true;
  btnText.style.display = 'none';
  spinner.style.display = 'block';

  try {
    const res  = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass }),
    });
    const data = await res.json();

    if (data.success) {
      // Save language preference
      if (data.language) { lang = data.language; localStorage.setItem('bc_lang', lang); }
      window.location.href = data.redirect || '/app';
    } else {
      const msg = t[data.error] || t.invalid_credentials;
      errBox.textContent  = msg;
      errBox.style.display = 'block';
      document.getElementById('email').classList.add('err');
      document.getElementById('pass').classList.add('err');
      btn.disabled = false;
      btnText.style.display = 'inline';
      spinner.style.display = 'none';
    }
  } catch (e) {
    errBox.textContent = 'Server error. Please try again.';
    errBox.style.display = 'block';
    btn.disabled = false;
    btnText.style.display = 'inline';
    spinner.style.display = 'none';
  }
}

// Enter key
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// Init lang
applyLang();
// Pre-select correct button
document.querySelectorAll('.lang-btn').forEach(b => {
  if (b.getAttribute('onclick') && b.getAttribute('onclick').includes(`'${lang}'`)) {
    b.classList.add('active');
  } else {
    if (!b.getAttribute('onclick').includes(`'${lang}'`)) b.classList.remove('active');
  }
});
</script>
</body>
</html>
