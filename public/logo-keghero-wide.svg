<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" width="360" height="80">
  <defs>
    <linearGradient id="wg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdb827"/>
      <stop offset="100%" style="stop-color:#d4700a"/>
    </linearGradient>
    <linearGradient id="wg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1c20"/>
      <stop offset="50%" style="stop-color:#2a2e36"/>
      <stop offset="100%" style="stop-color:#1a1c20"/>
    </linearGradient>
    <filter id="wglow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Keg icon -->
  <rect x="8"  y="17" width="28" height="46" rx="5" fill="url(#wg2)" stroke="#3a3f50" stroke-width="1.2"/>
  <rect x="3"  y="13" width="38" height="9"  rx="4" fill="url(#wg1)"/>
  <rect x="3"  y="58" width="38" height="9"  rx="4" fill="url(#wg1)"/>
  <rect x="8"  y="27" width="28" height="3"  rx="1.5" fill="#3a3f50"/>
  <rect x="8"  y="50" width="28" height="3"  rx="1.5" fill="#3a3f50"/>
  <!-- bolt on keg -->
  <polygon points="28,12 22,29 27,29 19,67 33,42 28,42 36,12" fill="url(#wg1)" filter="url(#wglow)" opacity="0.95"/>

  <!-- KegHero text -->
  <text x="58" y="48"
        font-family="'Barlow Condensed', 'Arial Narrow', sans-serif"
        font-size="42"
        font-weight="700"
        letter-spacing="1"
        fill="#eceef2">Keg</text>
  <text x="115" y="48"
        font-family="'Barlow Condensed', 'Arial Narrow', sans-serif"
        font-size="42"
        font-weight="700"
        letter-spacing="1"
        fill="url(#wg1)">Hero</text>

  <!-- Tagline -->
  <text x="59" y="64"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="11"
        letter-spacing="2.5"
        fill="#5c6378"
        text-transform="uppercase">DRAFT BEER MANAGEMENT</text>
</svg>
