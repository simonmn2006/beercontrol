<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KegHero | Live Display HD</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&family=Inter:wght@400;700;800&family=JetBrains+Mono:wght@700;800&display=swap');

    :root {
      --bg: #050506;
      --amber: #f59e0b;
      --blue: #3b82f6;
      --red: #ef4444;
      --green: #10b981;
      --text: #ffffff;
      --fm: 'Inter', sans-serif;
      --ft: 'Big Shoulders Display', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--fm);
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-evenly;
      /* Brushed Metal Background */
      background-image: 
        radial-gradient(circle at 50% 10%, rgba(40,40,60,1) 0%, rgba(5,5,6,1) 80%),
        repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 1px, transparent 1px, transparent 10px);
    }

    .container {
      width: 100%;
      height: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      padding: 60px 40px;
      gap: 20px;
    }

    /* TOP STATS */
    .top-stats {
      display: flex;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 20px;
    }

    .stat-box {
      width: 48%;
      text-align: center;
      position: relative;
    }

    .stat-label {
      font-family: var(--ft);
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    .gauge-ring {
      position: relative;
      width: 260px;
      height: 260px;
      margin: 0 auto;
    }

    .gauge-svg {
      transform: rotate(-90deg);
      width: 100%;
      height: 100%;
    }

    .gauge-bg { fill: none; stroke: rgba(255,255,255,0.03); stroke-width: 14; }
    .gauge-val {
      fill: none;
      stroke-width: 16;
      stroke-linecap: round;
      transition: stroke-dasharray 1.5s cubic-bezier(0.4, 0, 0.2, 1);
      filter: drop-shadow(0 0 10px currentColor);
    }

    .stat-value {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .stat-num { font-size: 72px; font-weight: 800; font-family: 'JetBrains Mono', monospace; line-height: 1; }
    .stat-unit { font-size: 20px; color: var(--text); opacity: 0.5; margin-top: 5px; font-weight: 700; letter-spacing: 2px; }

    /* CENTER KEG SECTION - BIGGER */
    .keg-area {
      flex: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .keg-glow {
      position: absolute;
      width: 500px;
      height: 800px;
      background: radial-gradient(circle, rgba(245,158,11,0.1) 0%, transparent 70%);
      filter: blur(60px);
      z-index: 0;
      animation: pulse-glow 5s infinite ease-in-out;
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.15); }
    }

    .keg-glass {
      position: relative;
      width: 520px;
      height: 780px;
      border: 8px solid rgba(255,255,255,0.15);
      border-radius: 80px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(8px);
      overflow: hidden;
      box-shadow: 
        inset 0 0 100px rgba(0,0,0,0.8),
        0 40px 100px rgba(0,0,0,1);
      z-index: 1;
    }

    /* Reflections */
    .keg-glass::before {
      content: ''; position: absolute; top: 5%; left: 8%; width: 15%; height: 90%;
      background: linear-gradient(to right, rgba(255,255,255,0.1), transparent);
      border-radius: 100px; pointer-events: none;
    }

    .keg-liquid {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, #6b3410, #f59e0b);
      transition: height 2.5s cubic-bezier(0.19, 1, 0.22, 1);
      box-shadow: 0 0 50px rgba(245,158,11,0.4);
    }

    /* FOAM */
    .keg-foam {
      position: absolute;
      top: -40px;
      left: 0;
      right: 0;
      height: 100px;
      background: #fdf6e3; /* Creamy foam */
      border-radius: 50% 50% 0 0;
      filter: blur(2px);
      box-shadow: 0 -10px 40px rgba(255,255,255,0.4);
      animation: foam-wobble 4s infinite ease-in-out;
      z-index: 2;
    }

    @keyframes foam-wobble {
      0%, 100% { transform: scaleY(1) translateY(0); }
      50% { transform: scaleY(1.1) translateY(-10px); }
    }

    .keg-bubbles { position: absolute; inset: 0; pointer-events: none; }
    .bubble {
      position: absolute;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      bottom: -10%;
      animation: rise 6s infinite ease-in;
    }

    @keyframes rise {
      0% { transform: translateY(0) scale(0.5); opacity: 0; }
      20% { opacity: 0.6; }
      100% { transform: translateY(-900px) scale(2); opacity: 0; }
    }

    /* BEER LOGO BADGE - METALLIC 3D */
    .beer-logo-badge {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 320px;
      height: 320px;
      background: radial-gradient(circle at 30% 30%, #444, #111);
      border: 12px solid #333;
      border-color: #555 #222 #111 #444; /* 3D effect */
      outline: 4px solid var(--amber);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      z-index: 10;
      box-shadow: 
        0 20px 60px rgba(0,0,0,0.8),
        inset 0 4px 20px rgba(255,255,255,0.2);
    }

    .logo-img { max-width: 90%; max-height: 90%; filter: drop-shadow(0 0 20px rgba(255,255,255,0.2)); }
    .beer-name-badge {
      position: absolute;
      bottom: -40px;
      background: linear-gradient(to bottom, var(--amber), #b45309);
      color: #000;
      font-size: 32px;
      font-family: var(--ft);
      font-weight: 950;
      padding: 10px 40px;
      border-radius: 60px;
      white-space: nowrap;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      text-transform: uppercase;
      letter-spacing: 2px;
      border: 3px solid rgba(0,0,0,0.2);
    }

    /* FLOW RATE SECTION - ENLARGED */
    .bottom-section {
      text-align: center;
      margin-top: 40px;
    }

    .flow-label {
      font-family: var(--ft);
      font-size: 32px;
      font-weight: 900;
      color: rgba(255,255,255,0.4);
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 5px;
    }

    .flow-value {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 30px;
    }

    .flow-icon { font-size: 80px; filter: drop-shadow(0 0 30px var(--amber)); }
    .flow-num { font-size: 140px; font-weight: 900; font-family: 'JetBrains Mono', monospace; line-height: 0.8; }
    .flow-unit { font-size: 24px; text-align: left; opacity: 0.5; line-height: 1.2; font-weight: 700; margin-left: 10px; }

    /* ALERT BAR - BIGGER */
    .alert-bar {
      background: linear-gradient(90deg, transparent, rgba(239, 68, 68, 0.3), transparent);
      border: 3px solid rgba(239, 68, 68, 0.4);
      padding: 24px 40px;
      border-radius: 100px;
      margin-top: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      animation: alert-pulse 1.5s infinite ease-in-out;
      display: none;
    }

    @keyframes alert-pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.03); opacity: 1; }
    }

    .alert-text { font-size: 28px; font-weight: 900; text-transform: uppercase; color: var(--red); font-family: var(--ft); border-spacing: 2px; }

    /* TRANSITIONS */
    .fade-switch { animation: fadeSwitch 1s ease-in-out; }
    @keyframes fadeSwitch { 0% { opacity: 0; transform: scale(0.98); } 100% { opacity: 1; transform: scale(1); } }

  </style>
</head>
<body>

<div class="container" id="mainContainer">
  <div class="top-stats">
    <div class="stat-box">
      <div class="stat-label">Pressure</div>
      <div class="gauge-ring">
        <svg class="gauge-svg" viewBox="0 0 260 260">
          <circle class="gauge-bg" cx="130" cy="130" r="115"></circle>
          <circle id="gaugeCo2" class="gauge-val" cx="130" cy="130" r="115" stroke="var(--amber)" stroke-dasharray="0 722"></circle>
        </svg>
        <div class="stat-value">
          <div class="stat-num" id="valCo2">0.0</div>
          <div class="stat-unit">PSI</div>
        </div>
      </div>
    </div>

    <div class="stat-box">
      <div class="stat-label">Temperature</div>
      <div class="gauge-ring">
        <svg class="gauge-svg" viewBox="0 0 260 260">
          <circle class="gauge-bg" cx="130" cy="130" r="115"></circle>
          <circle id="gaugeTemp" class="gauge-val" cx="130" cy="130" r="115" stroke="var(--blue)" stroke-dasharray="0 722"></circle>
        </svg>
        <div class="stat-value">
          <div class="stat-num" id="valTemp">0.0</div>
          <div class="stat-unit">°C</div>
        </div>
      </div>
    </div>
  </div>

  <div class="keg-area">
    <div class="keg-glow" id="kegGlow"></div>
    <div class="keg-glass">
      <div class="keg-liquid" id="liquidLevel" style="height: 0%;">
        <div class="keg-foam"></div>
      </div>
      <div class="keg-bubbles" id="bubblePool"></div>
    </div>
    <div class="beer-logo-badge">
      <div id="logoContainer" class="logo-img">🍺</div>
      <div class="beer-name-badge" id="beerName">Connecting...</div>
    </div>
  </div>

  <div class="bottom-section">
    <div class="flow-label">Pour Rate</div>
    <div class="flow-value">
      <div class="flow-icon">🍺</div>
      <div class="flow-num" id="valFlow">0.00</div>
      <div class="flow-unit">LITERS /<br>MINUTE</div>
    </div>

    <div class="alert-bar" id="alertBar">
      <span style="font-size:32px">⚠️</span>
      <span class="alert-text" id="alertText">LOW LEVEL WARNING</span>
    </div>
  </div>
</div>

<script>
  const DISPLAY_ID = window.location.pathname.split('/').pop();
  let currentKegIndex = 0;
  let allKegs = [];
  let updateInterval = null;

  // UI Elements
  const elLevel = document.getElementById('liquidLevel');
  const elBeerName = document.getElementById('beerName');
  const elLogo = document.getElementById('logoContainer');
  const elCo2Num = document.getElementById('valCo2');
  const elTempNum = document.getElementById('valTemp');
  const elFlowNum = document.getElementById('valFlow');
  const elGaugeCo2 = document.getElementById('gaugeCo2');
  const elGaugeTemp = document.getElementById('gaugeTemp');
  const elAlert = document.getElementById('alertBar');
  const elAlertText = document.getElementById('alertText');
  const elGlow = document.getElementById('kegGlow');

  function updateGauge(circle, value, max) {
    const circumference = 722;
    const progress = Math.min(value / max, 1);
    const dash = progress * circumference;
    circle.style.strokeDasharray = `${dash} ${circumference}`;
  }

  function renderKeg(keg) {
    if (!keg) return;

    // Transition effect
    const container = document.getElementById('mainContainer');
    container.classList.remove('fade-switch');
    void container.offsetWidth; // trigger reflow
    container.classList.add('fade-switch');

    // Data updates
    elBeerName.textContent = keg.beer_name;
    elLevel.style.height = `${keg.remaining_pct}%`;
    
    // Values
    elCo2Num.textContent = (keg.current_co2 || 0).toFixed(1);
    elTempNum.textContent = (keg.current_temp || 0).toFixed(1);
    elFlowNum.textContent = (keg.current_flow || 0).toFixed(2);

    // Gauges (optimized for 30 PSI / 20 °C max visual)
    updateGauge(elGaugeCo2, keg.current_co2 || 0, 30); 
    updateGauge(elGaugeTemp, keg.current_temp || 0, 20); 

    // Logo
    if (keg.logo_path) {
      elLogo.innerHTML = `<img src="${keg.logo_path}" style="width:100%;height:100%;object-fit:contain">`;
    } else {
      elLogo.textContent = '🍺';
      elLogo.style.fontSize = '120px';
    }

    // Alerts
    if (keg.remaining_pct < (keg.alert_low_pct || 20)) {
      elAlert.style.display = 'flex';
      elAlertText.textContent = `CRITICAL: ${Math.round(keg.remaining_liters)}L LEFT`;
    } else {
      elAlert.style.display = 'none';
    }

    // Glow color based on temp
    const t = keg.current_temp || 0;
    if (t > 8) elGlow.style.background = 'radial-gradient(circle, rgba(239,68,68,0.2) 0%, transparent 70%)';
    else if (t < 4) elGlow.style.background = 'radial-gradient(circle, rgba(59,130,246,0.2) 0%, transparent 70%)';
    else elGlow.style.background = 'radial-gradient(circle, rgba(245,158,11,0.2) 0%, transparent 70%)';
  }

  // Carousel Logic
  function startCarousel() {
    if (updateInterval) clearInterval(updateInterval);
    if (allKegs.length <= 1) return;

    updateInterval = setInterval(() => {
      currentKegIndex = (currentKegIndex + 1) % allKegs.length;
      renderKeg(allKegs[currentKegIndex]);
    }, 10000); // 10 seconds for HD viewing
  }

  // ── Bubbles ──
  function createBubbles() {
    const container = document.getElementById('bubblePool');
    setInterval(() => {
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      const size = Math.random() * 12 + 4;
      bubble.style.width = size + 'px';
      bubble.style.height = size + 'px';
      bubble.style.left = Math.random() * 100 + '%';
      bubble.style.animationDuration = (Math.random() * 4 + 3) + 's';
      container.appendChild(bubble);
      setTimeout(() => bubble.remove(), 6000);
    }, 300);
  }

  // ── Real-time Connection ──
  function initStream() {
    const source = new EventSource('/api/mqtt/stream');
    source.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      if (msg.type === 'message') {
        const topic = msg.data.topic;
        const data = msg.data.data;

        if (topic === `keghero/display/${DISPLAY_ID}/kegs`) {
          allKegs = data.kegs || [];
          if (allKegs.length > 0) {
            renderKeg(allKegs[currentKegIndex] || allKegs[0]);
            startCarousel();
          }
        }
      }
    };
  }

  // Initial setup
  createBubbles();
  initStream();
  
</script>
</body>
</html>
