<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, height=1560, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KegHero Live Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-user-select: none; user-select: none;
    }

    body, html {
      width: 750px; height: 1560px;
      background: #0a0a0f;
      color: #fff;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* ── BACKGROUND ── */
    .screen {
      width: 750px; height: 1560px;
      position: relative;
      background:
        radial-gradient(ellipse 500px 300px at 50% 5%,  rgba(245,158,11,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 700px 500px at 50% 95%, rgba(120,60,10,0.25)   0%, transparent 70%),
        linear-gradient(160deg, #12111e 0%, #1a1628 30%, #1c1510 70%, #151010 100%);
    }

    /* ── HEADER ── */
    .header {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 50px 50px 30px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%);
    }

    .live-badge {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 700; letter-spacing: 3px;
      color: rgba(255,255,255,0.4); text-transform: uppercase;
    }
    .live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 12px #22c55e;
      animation: blink 2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .beer-name {
      font-size: 72px; font-weight: 900;
      text-align: center; line-height: 1;
      text-shadow: 0 0 60px rgba(245,158,11,0.4);
      letter-spacing: -1px;
    }

    .status-pill {
      padding: 8px 28px; border-radius: 100px;
      font-size: 15px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase;
      border: 1px solid currentColor;
      transition: all 0.4s ease;
    }

    /* ── GAUGES ROW ── */
    .gauges-row {
      position: absolute; top: 290px; left: 0; right: 0;
      display: flex; justify-content: space-around; align-items: flex-start;
      padding: 0 25px;
    }

    .gauge-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 18px;
    }

    /* Outer glow halo */
    .gauge-halo {
      position: relative;
      width: 320px; height: 320px;
      border-radius: 50%;
      box-shadow: 0 0 60px rgba(245,158,11,0.08);
    }
    .gauge-halo.blue { box-shadow: 0 0 60px rgba(56,189,248,0.08); }

    .gauge-ring {
      position: relative; width: 100%; height: 100%;
    }
    .gauge-ring svg {
      width: 100%; height: 100%;
      overflow: visible;
    }

    /* Decorative back plate */
    .g-plate   { fill: #0e0e18; }
    .g-rim     { fill: none; stroke: rgba(255,255,255,0.04); stroke-width: 1.5; }
    .g-rim2    { fill: none; stroke: rgba(255,255,255,0.025); stroke-width: 1; }

    /* Track arcs — 270° sweep starting at 135° */
    .g-track {
      fill: none;
      stroke: rgba(255,255,255,0.05);
      stroke-width: 14;
      stroke-linecap: round;
    }
    /* Danger zone arc (red zone for high values) */
    .g-danger {
      fill: none;
      stroke: rgba(239,68,68,0.15);
      stroke-width: 14;
      stroke-linecap: round;
    }
    /* Live fill arc */
    .g-fill {
      fill: none;
      stroke-width: 14;
      stroke-linecap: round;
      transition: stroke-dasharray 1.4s cubic-bezier(0.4, 0, 0.2, 1),
                  stroke 0.5s ease, filter 0.5s ease;
    }
    /* Glow duplicate (blurred behind) */
    .g-glow {
      fill: none;
      stroke-width: 22;
      stroke-linecap: round;
      opacity: 0.25;
      filter: blur(8px);
      transition: stroke-dasharray 1.4s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.5s ease;
    }

    /* 3D gauge depth */
    .g-specular {
      fill: none;
      stroke: rgba(255,255,255,0.06);
      stroke-width: 30;
      stroke-linecap: round;
      filter: blur(6px);
    }
    .g-bevel-dark {
      fill: none;
      stroke: rgba(0,0,0,0.6);
      stroke-width: 6;
      stroke-linecap: round;
    }
    .g-bevel-light {
      fill: none;
      stroke: rgba(255,255,255,0.08);
      stroke-width: 3;
      stroke-linecap: round;
    }

    /* Center readout */
    .gauge-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2px;
    }
    .gauge-icon  { font-size: 28px; margin-bottom: 4px; }
    .gauge-value {
      font-size: 88px; font-weight: 800;
      font-family: 'JetBrains Mono', monospace;
      line-height: 1;
      transition: color 0.5s ease, text-shadow 0.5s ease;
      letter-spacing: -2px;
    }
    .gauge-unit {
      font-size: 20px; font-weight: 700;
      opacity: 0.35; letter-spacing: 3px;
      margin-top: 2px;
    }

    /* Label + min/max strip below */
    .gauge-footer {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    .gauge-label {
      font-size: 20px; font-weight: 900; letter-spacing: 3px;
      text-transform: uppercase; opacity: 0.7;
    }
    .gauge-minmax {
      display: flex; gap: 30px;
      font-size: 12px; font-family: 'JetBrains Mono', monospace;
      opacity: 0.2; letter-spacing: 1px;
    }

    /* ── BEER LEVEL COLUMN ── */
    .level-section {
      position: absolute; top: 700px; right: 40px;
      display: flex; flex-direction: column; align-items: center; gap: 0;
    }

    .level-header {
      font-size: 20px; font-weight: 900; letter-spacing: 4px;
      opacity: 0.7; text-transform: uppercase; margin-bottom: 20px;
    }

    .level-frame {
      position: relative;
      width: 200px; height: 720px;
    }

    /* Outer casing */
    .level-casing {
      position: absolute; inset: 0;
      border-radius: 65px;
      border: 2px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.02);
      box-shadow:
        inset 0 0 40px rgba(0,0,0,0.8),
        0 0 0 1px rgba(255,255,255,0.03);
    }

    /* Inner fill track — houses the canvas */
    .level-track {
      position: absolute; inset: 8px;
      border-radius: 57px;
      background: #060408;
      overflow: hidden;
    }

    /* Canvas fills the track perfectly */
    #beerCanvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border-radius: 57px;
    }

    /* Tick marks */
    .level-ticks {
      position: absolute; top: 8px; right: -28px; bottom: 8px;
      display: flex; flex-direction: column; justify-content: space-between;
      align-items: flex-start;
    }
    .tick {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      color: rgba(255,255,255,0.25);
    }
    .tick-line { width: 10px; height: 1px; background: rgba(255,255,255,0.15); }
    .tick.major .tick-line { width: 16px; background: rgba(255,255,255,0.3); }

    /* Floating side % indicator — small, stays at liquid surface */
    .pct-indicator {
      position: absolute; left: -90px;
      transform: translateY(-50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px; font-weight: 800;
      transition: top 1.2s cubic-bezier(0.4, 0, 0.2, 1), color 0.5s ease;
      text-align: right; white-space: nowrap; opacity: 0.5;
    }

    /* ── OUTSIDE INFO PANEL ── */
    .level-info-panel {
      position: absolute;
      right: calc(100% + 36px);
      top: 50%; transform: translateY(-50%);
      width: 210px;
      display: flex; flex-direction: column; align-items: flex-end; gap: 12px;
    }

    /* Huge glowing % */
    .info-pct {
      font-family: 'JetBrains Mono', monospace;
      font-size: 110px; font-weight: 900; line-height: 1;
      letter-spacing: -4px;
      transition: color 0.4s ease, text-shadow 0.4s ease;
      color: #f59e0b;
      text-shadow:
        0 0 30px rgba(245,158,11,0.9),
        0 0 80px rgba(245,158,11,0.4),
        0 4px 20px rgba(0,0,0,0.8);
    }
    .info-label {
      font-size: 15px; font-weight: 900; letter-spacing: 5px;
      text-transform: uppercase; opacity: 0.4; margin-top: -6px;
    }
    .info-divider {
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    }
    .info-liters {
      font-family: 'JetBrains Mono', monospace;
      font-size: 34px; font-weight: 800; opacity: 0.65;
      transition: color 0.4s ease;
    }
    .info-liters-lbl {
      font-size: 13px; font-weight: 700; letter-spacing: 3px;
      opacity: 0.3; text-transform: uppercase;
    }
    .info-badge {
      padding: 7px 20px; border-radius: 100px;
      font-size: 13px; font-weight: 900; letter-spacing: 3px;
      text-transform: uppercase; border: 2px solid currentColor;
      transition: color 0.4s ease, box-shadow 0.4s ease;
    }

    /* Big centered % — always in the middle of the tube */
    .big-pct {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 52px; font-weight: 900;
      color: rgba(255,255,255,0.5);
      text-shadow: 0 2px 20px rgba(0,0,0,0.8), 0 0 40px rgba(0,0,0,0.9);
      letter-spacing: -2px;
      z-index: 10; pointer-events: none;
      transition: color 0.5s ease;
    }

    /* Bubbles */
    .bubble-layer {
      position: absolute; inset: 8px; border-radius: 57px; overflow: hidden;
      pointer-events: none;
    }
    .bubble {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,0.35);
      animation: rise linear infinite;
    }
    @keyframes rise {
      from { transform: translateY(0) scale(1); opacity: 0.5; }
      to { transform: translateY(-620px) scale(0.3); opacity: 0; }
    }

    /* ── FOOTER ── */
    .footer {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 40px 50px 60px;
      background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent 100%);
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }

    .pints-row {
      display: flex; align-items: baseline; gap: 10px;
    }
    .pints-val {
      font-size: 60px; font-weight: 900;
      font-family: 'JetBrains Mono', monospace;
    }
    .pints-lbl {
      font-size: 16px; font-weight: 700; letter-spacing: 3px;
      opacity: 0.4; text-transform: uppercase;
    }



    /* ── ALERT OVERLAY ── */
    #alertOverlay {
      position: fixed; inset: 0; z-index: 999;
      display: none; align-items: center; justify-content: center;
      background: rgba(239, 68, 68, 0.15);
      backdrop-filter: blur(6px);
    }
    #alertOverlay.show { display: flex; }
    .alert-box {
      text-align: center;
      animation: alertPulse 1.2s infinite ease-in-out;
    }
    .alert-icon { font-size: 100px; display: block; }
    .alert-text {
      font-size: 72px; font-weight: 900; letter-spacing: 4px;
      color: #ef4444;
      text-shadow: 0 0 60px rgba(239,68,68,0.8);
    }
    .alert-sub {
      font-size: 22px; opacity: 0.6; margin-top: 10px; letter-spacing: 2px;
    }
    /* Red pulsing border — rounded corners to match display */
    #alertOverlay::before {
      content: ''; position: fixed; inset: 0;
      border: 18px solid #ef4444;
      border-radius: 48px;
      animation: borderPulse 1.2s infinite ease-in-out;
      pointer-events: none;
    }
    @keyframes alertPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.03)} }
    @keyframes borderPulse { 0%,100%{opacity:1; box-shadow:0 0 60px rgba(239,68,68,0.8) inset;} 50%{opacity:0.2;} }

    /* ── LEVEL STATE COLORS ── */
    .level--ok    .level-fill {
      background: linear-gradient(180deg, #fde68a 0%, #f59e0b 40%, #d97706 100%);
      box-shadow: 0 -10px 40px rgba(245,158,11,0.5), 0 0 60px rgba(245,158,11,0.15);
    }
    .level--low   .level-fill {
      background: linear-gradient(180deg, #fed7aa 0%, #f97316 40%, #ea580c 100%);
      box-shadow: 0 -10px 40px rgba(249,115,22,0.7), 0 0 60px rgba(249,115,22,0.2);
    }
    .level--crit  .level-fill {
      background: linear-gradient(180deg, #fecaca 0%, #ef4444 40%, #dc2626 100%);
      box-shadow: 0 -10px 40px rgba(239,68,68,0.8), 0 0 60px rgba(239,68,68,0.3);
      animation: critPulse 1.2s infinite;
    }
    @keyframes critPulse {
      0%,100% { box-shadow: 0 -10px 40px rgba(239,68,68,0.8); }
      50%     { box-shadow: 0 -20px 80px rgba(239,68,68,1.0); }
    }

    /* pour animation */
    .pouring .level-fill { animation: pourShimmer 0.3s infinite; }
    @keyframes pourShimmer { 0%,100%{opacity:1} 50%{opacity:0.85} }
  </style>
</head>
<body>

<div id="alertOverlay">
  <div class="alert-box">
    <div class="alert-text" id="alertText">REPLACE KEG</div>
    <div class="alert-sub" id="alertSub">Level Critical — Act Now</div>
  </div>
</div>

<div class="screen">

  <!-- HEADER -->
  <div class="header">
    <div class="live-badge">
      <div class="live-dot"></div>
      LIVE TAP FEED
    </div>
    <div class="beer-name" id="txtName">LOADING…</div>
    <div class="status-pill" id="txtStatus">SYSTEM READY</div>
  </div>

  <!-- GAUGES -->
  <div class="gauges-row">

    <!-- TEMPERATURE -->
    <div class="gauge-wrap">
      <div class="gauge-halo">
        <div class="gauge-ring">
          <svg viewBox="0 0 200 200">
            <defs>
              <linearGradient id="tempGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#f59e0b"/>
                <stop offset="100%" stop-color="#fde68a"/>
              </linearGradient>
              <radialGradient id="plateTG" cx="32%" cy="28%" r="65%">
                <stop offset="0%" stop-color="#28283c"/>
                <stop offset="100%" stop-color="#090910"/>
              </radialGradient>
            </defs>
            <!-- 3D back plate -->
            <circle cx="100" cy="100" r="99" fill="url(#plateTG)"/>
            <!-- Bevel dark (bottom-right) -->
            <circle class="g-bevel-dark" cx="100" cy="100" r="97"
              stroke-dasharray="240 612" stroke-dashoffset="-72"/>
            <!-- Bevel light (top-left) -->
            <circle class="g-bevel-light" cx="100" cy="100" r="97"
              stroke-dasharray="200 612" stroke-dashoffset="348"/>
            <!-- Specular gleam -->
            <circle class="g-specular" cx="100" cy="100" r="80"
              stroke-dasharray="70 503" stroke-dashoffset="62"/>
            <circle class="g-rim2" cx="100" cy="100" r="90"/>
            <!-- Fine tick marks (20 ticks over 270°) -->
            <g id="ticksTemp" transform="translate(100,100)">
              <!-- generated by JS -->
            </g>
            <!-- Track (270° arc, r=76): circ=477.5, 270/360*477.5=358.1 -->
            <circle class="g-track" cx="100" cy="100" r="76"
              stroke-dasharray="358 478"
              stroke-dashoffset="-179"
              transform="rotate(-135 100 100)"/>
            <!-- Danger zone highlight (last 20% = top 70px) -->
            <circle class="g-danger" cx="100" cy="100" r="76"
              stroke-dasharray="72 478"
              stroke-dashoffset="-467"
              transform="rotate(-135 100 100)"/>
            <!-- Glow layer -->
            <circle class="g-glow" id="gGlowTemp" cx="100" cy="100" r="76"
              stroke="#f59e0b"
              stroke-dasharray="0 478"
              stroke-dashoffset="-179"
              transform="rotate(-135 100 100)"/>
            <!-- Fill arc -->
            <circle class="g-fill" id="gFillTemp" cx="100" cy="100" r="76"
              stroke="url(#tempGrad)"
              stroke-dasharray="0 478"
              stroke-dashoffset="-179"
              transform="rotate(-135 100 100)"/>
            <!-- Inner rim -->
            <circle class="g-rim2" cx="100" cy="100" r="62"/>
          </svg>
          <div class="gauge-center">
            <span class="gauge-value" id="gValTemp" style="color:#f59e0b;text-shadow:0 0 40px rgba(245,158,11,0.7)">0.0</span>
            <span class="gauge-unit">°C</span>
          </div>
        </div>
      </div>
      <div class="gauge-footer">
        <span class="gauge-label">Temperature</span>
        <div class="gauge-minmax"><span>0°C</span><span>20°C</span></div>
      </div>
    </div>

    <!-- CO2 PRESSURE -->
    <div class="gauge-wrap">
      <div class="gauge-halo blue">
        <div class="gauge-ring">
          <svg viewBox="0 0 200 200">
            <defs>
              <linearGradient id="co2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#38bdf8"/>
                <stop offset="100%" stop-color="#bae6fd"/>
              </linearGradient>
              <radialGradient id="plateCG" cx="32%" cy="28%" r="65%">
                <stop offset="0%" stop-color="#0e1e30"/>
                <stop offset="100%" stop-color="#060810"/>
              </radialGradient>
            </defs>
            <!-- 3D back plate -->
            <circle cx="100" cy="100" r="99" fill="url(#plateCG)"/>
            <!-- Bevel dark (bottom-right) -->
            <circle class="g-bevel-dark" cx="100" cy="100" r="97"
              stroke-dasharray="240 612" stroke-dashoffset="-72"/>
            <!-- Bevel light (top-left) -->
            <circle class="g-bevel-light" cx="100" cy="100" r="97"
              stroke-dasharray="200 612" stroke-dashoffset="348"/>
            <!-- Specular gleam -->
            <circle class="g-specular" cx="100" cy="100" r="80"
              stroke-dasharray="70 503" stroke-dashoffset="62"/>
            <circle class="g-rim2" cx="100" cy="100" r="90"/>
            <g id="ticksCo2" transform="translate(100,100)"></g>
            <circle class="g-track" cx="100" cy="100" r="76"
              stroke-dasharray="358 478"
              stroke-dashoffset="-179"
              transform="rotate(-135 100 100)"/>
            <circle class="g-danger" cx="100" cy="100" r="76"
              stroke-dasharray="72 478"
              stroke-dashoffset="-467"
              transform="rotate(-135 100 100)"/>
            <circle class="g-glow" id="gGlowCo2" cx="100" cy="100" r="76"
              stroke="#38bdf8"
              stroke-dasharray="0 478"
              stroke-dashoffset="-179"
              transform="rotate(-135 100 100)"/>
            <circle class="g-fill" id="gFillCo2" cx="100" cy="100" r="76"
              stroke="url(#co2Grad)"
              stroke-dasharray="0 478"
              stroke-dashoffset="-179"
              transform="rotate(-135 100 100)"/>
            <circle class="g-rim2" cx="100" cy="100" r="62"/>
          </svg>
          <div class="gauge-center">
            <span class="gauge-value" id="gValCo2" style="color:#38bdf8;text-shadow:0 0 40px rgba(56,189,248,0.7)">0.0</span>
            <span class="gauge-unit">BAR</span>
          </div>
        </div>
      </div>
      <div class="gauge-footer">
        <span class="gauge-label">CO₂ Pressure</span>
        <div class="gauge-minmax"><span>0 BAR</span><span>5 BAR</span></div>
      </div>
    </div>

  </div>

  <!-- BEER LEVEL COLUMN -->
  <div class="level-section">
    <div class="level-header">Beer Remaining</div>

    <div class="level-frame" id="levelFrame">
      <div class="level-casing"></div>
      <div class="level-track">
        <canvas id="beerCanvas"></canvas>
      </div>

      <!-- Big centered % -->
      <div class="big-pct" id="bigPct">0%</div>

      <!-- Tick marks -->
      <div class="level-ticks">
        <div class="tick major"><div class="tick-line"></div>100%</div>
        <div class="tick"><div class="tick-line"></div>75%</div>
        <div class="tick major"><div class="tick-line"></div>50%</div>
        <div class="tick"><div class="tick-line"></div>25%</div>
        <div class="tick major"><div class="tick-line"></div>0%</div>
      </div>

      <!-- OUTSIDE INFO PANEL -->
      <div class="level-info-panel">
        <div class="info-pct" id="infoPct">0%</div>
        <div class="info-label">Remaining</div>
        <div class="info-divider"></div>
        <div class="info-liters" id="infoLiters">0.0<span class="info-liters-lbl"> L</span></div>
        <div class="info-liters-lbl">Est. in keg</div>
        <div class="info-divider"></div>
        <div class="info-badge" id="infoBadge">STABLE</div>
      </div>
    </div>
  </div>



</div>

<script>
  const params     = new URLSearchParams(window.location.search);
  const DISPLAY_ID = window.location.pathname.split('/').pop();

  let lastTemp    = null;
  let curLevel    = 0;
  let flowActive  = false;

  /* ── Gauge arc helper ── */
  // 270° sweep, r=76 in a 200x200 viewBox
  // Circumference = 2π*76 ≈ 477.5. Arc = 477.5 * 0.75 ≈ 358
  const CIRC = 2 * Math.PI * 76; // ≈477.5
  const ARC  = CIRC * 0.75;       // ≈358

  function setGaugeFill(fillId, glowId, value, min, max) {
    const pct  = Math.min(Math.max((value - min) / (max - min), 0), 1);
    const dash = pct * ARC;
    const arr  = `${dash} ${CIRC}`;
    document.getElementById(fillId).style.strokeDasharray = arr;
    if (glowId) document.getElementById(glowId).style.strokeDasharray = arr;
  }

  /* ── Tick mark generator ── */
  function buildTicks(containerId, count, r1, r2) {
    const g = document.getElementById(containerId);
    if (!g) return;
    const startAngle = -135; // degrees
    const sweep = 270;
    for (let i = 0; i <= count; i++) {
      const angle = (startAngle + (sweep / count) * i) * Math.PI / 180;
      const isMajor = i % 5 === 0;
      const inner   = isMajor ? r1 - 6 : r1 - 3;
      const line    = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', (r1 * Math.cos(angle)).toFixed(2));
      line.setAttribute('y1', (r1 * Math.sin(angle)).toFixed(2));
      line.setAttribute('x2', (inner * Math.cos(angle)).toFixed(2));
      line.setAttribute('y2', (inner * Math.sin(angle)).toFixed(2));
      line.setAttribute('class', isMajor ? 'g-tick-major' : 'g-tick-minor');
      g.appendChild(line);
    }
  }
  buildTicks('ticksTemp', 20, 86, 80);
  buildTicks('ticksCo2',  20, 86, 80);

  /* ────────────────────────────────────────
     REAL BEER CANVAS RENDERER
  ─────────────────────────────────────── */
  const canvas = document.getElementById('beerCanvas');
  const ctx    = canvas.getContext('2d');

  // 3D Keg dimensions (2× retina)
  const CW = 200, CH = 720;
  canvas.width  = CW * 2;
  canvas.height = CH * 2;
  ctx.scale(2, 2);

  // 3D Cylinder geometry
  const CYL_W_OUTER = CW;
  const CYL_W_INNER = CW - 24; 
  const CYL_X_INNER = 12;
  const CYL_Y_TOP = 80;
  const CYL_Y_BOT = CH - 80;
  const EL_H_OUTER = 22; 
  const EL_H_INNER = 18; 

  const LIQ_TOP = CYL_Y_TOP + 10;
  const LIQ_BOT = CYL_Y_BOT - 10;
  const LIQ_H = LIQ_BOT - LIQ_TOP;
  
  let beerTargetLevel = 0;
  let beerCurrentLevel = 0;
  let waveTime = 0;

  const bubbles = [];
  function spawnCanvasBubble() {
    if (beerCurrentLevel < 0.02) return;
    bubbles.push({
      x: CYL_X_INNER + 10 + Math.random() * (CYL_W_INNER - 20),
      y: LIQ_BOT,
      r: 1 + Math.random() * 3.5,
      speed: 0.4 + Math.random() * 0.8,
      opacity: 0.3 + Math.random() * 0.4,
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: 0.03 + Math.random() * 0.04
    });
  }
  setInterval(spawnCanvasBubble, 300);

  function cylinderPath(ctx, x, yTop, yBot, w, rh) {
    ctx.beginPath();
    ctx.ellipse(x + w/2, yTop, w/2, rh, 0, Math.PI, 0); 
    ctx.lineTo(x + w, yBot);
    ctx.ellipse(x + w/2, yBot, w/2, rh, 0, 0, Math.PI); 
    ctx.lineTo(x, yTop);
    ctx.closePath();
  }

  function renderBeer() {
    beerCurrentLevel += (beerTargetLevel - beerCurrentLevel) * 0.012;
    waveTime += 0.022;
    ctx.clearRect(0, 0, CW, CH);

    const rawSurf = LIQ_BOT - beerCurrentLevel * LIQ_H;
    const amp     = 4 + (flowActive ? 5 : 0);

    // ── 1. BACKGROUND (Dark inside of glass) ──
    ctx.save();
    cylinderPath(ctx, CYL_X_INNER, CYL_Y_TOP, CYL_Y_BOT, CYL_W_INNER, EL_H_INNER);
    ctx.fillStyle = '#060302';
    ctx.fill();
    ctx.restore();

    // ── 2. BEER LIQUID ──
    if (beerCurrentLevel > 0.005) {
      ctx.save();
      cylinderPath(ctx, CYL_X_INNER, CYL_Y_TOP, CYL_Y_BOT, CYL_W_INNER, EL_H_INNER);
      ctx.clip();

      ctx.beginPath();
      ctx.moveTo(CYL_X_INNER, rawSurf);
      for (let x = CYL_X_INNER; x <= CYL_X_INNER + CYL_W_INNER; x++) {
        const waveY = rawSurf
          + Math.sin(waveTime + (x - CYL_X_INNER) * 0.05) * amp
          + Math.cos(waveTime * 0.6 + (x - CYL_X_INNER) * 0.08) * amp * 0.5;
        ctx.lineTo(x, waveY);
      }
      ctx.lineTo(CYL_X_INNER + CYL_W_INNER, LIQ_BOT);
      ctx.ellipse(CW/2, LIQ_BOT, CYL_W_INNER/2, EL_H_INNER, 0, 0, Math.PI);
      ctx.lineTo(CYL_X_INNER, LIQ_BOT);
      ctx.closePath();
      
      const bg = ctx.createLinearGradient(0, rawSurf, 0, CH);
      bg.addColorStop(0.00, 'rgba(255,215,55,0.97)');
      bg.addColorStop(0.12, 'rgba(240,165,18,0.98)');
      bg.addColorStop(0.45, 'rgba(208,112,8,0.99)');
      bg.addColorStop(0.80, 'rgba(165,65,5,1.00)');
      bg.addColorStop(1.00, 'rgba(110,35,3,1.00)');
      ctx.fillStyle = bg;
      ctx.fill();

      const sx = (Math.sin(waveTime * 0.45) * 0.5 + 0.5) * CYL_W_INNER + CYL_X_INNER;
      const lg = ctx.createLinearGradient(sx - 18, 0, sx + 38, CH);
      lg.addColorStop(0,    'rgba(255,255,200,0)');
      lg.addColorStop(0.4,  `rgba(255,245,160,${0.09 + Math.sin(waveTime) * 0.04})`);
      lg.addColorStop(0.6,  `rgba(255,255,210,${0.14 + Math.cos(waveTime*0.7)*0.05})`);
      lg.addColorStop(1,    'rgba(255,255,200,0)');
      ctx.fillStyle = lg;
      ctx.fill();

      for (let i = bubbles.length - 1; i >= 0; i--) {
        const b = bubbles[i];
        b.y -= b.speed; b.wobble += b.wobbleSpeed;
        b.x += Math.sin(b.wobble) * 0.4;
        const bs = rawSurf + Math.sin(waveTime + b.x * 0.05) * amp;
        if (b.y < bs) { bubbles.splice(i, 1); continue; }
        ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,245,200,${b.opacity * 0.3})`; ctx.fill();
        ctx.strokeStyle = `rgba(255,255,255,${b.opacity})`;
        ctx.lineWidth = 0.6; ctx.stroke();
      }

      const fH = Math.max(12, CYL_W_INNER * 0.1);
      const foamG = ctx.createLinearGradient(0, rawSurf - fH, 0, rawSurf + 4);
      foamG.addColorStop(0.0, 'rgba(255,252,242,0.0)');
      foamG.addColorStop(0.3, 'rgba(255,250,232,0.88)');
      foamG.addColorStop(0.8, 'rgba(255,245,215,0.94)');
      foamG.addColorStop(1.0, 'rgba(245,225,170,0.5)');
      ctx.fillStyle = foamG;
      ctx.beginPath();
      for (let x = CYL_X_INNER; x <= CYL_X_INNER + CYL_W_INNER; x++) {
        const fy = rawSurf + Math.sin(waveTime + (x-CYL_X_INNER)*0.05)*amp + Math.cos(waveTime*0.6+(x-CYL_X_INNER)*0.08)*amp*0.5 - fH*0.5;
        if (x === CYL_X_INNER) ctx.moveTo(x, fy); else ctx.lineTo(x, fy);
      }
      ctx.lineTo(CYL_X_INNER + CYL_W_INNER, rawSurf + 6); ctx.lineTo(CYL_X_INNER, rawSurf + 6); ctx.closePath(); ctx.fill();
      ctx.restore();
    }

    // ── 3. METALLIC CAPS & GLASS FRAME ──
    const drawEllipse = (x, y, w, rh, grad) => {
      ctx.beginPath();
      ctx.ellipse(x + w/2, y, w/2, rh, 0, 0, Math.PI*2);
      ctx.fillStyle = grad;
      ctx.fill();
    };

    const mG = ctx.createLinearGradient(0, 0, CW, 0);
    mG.addColorStop(0.00, '#111');
    mG.addColorStop(0.15, '#4a4a4a');
    mG.addColorStop(0.30, '#888');
    mG.addColorStop(0.45, '#e0e0e0');
    mG.addColorStop(0.55, '#ffffff');
    mG.addColorStop(0.70, '#888');
    mG.addColorStop(0.85, '#222');
    mG.addColorStop(1.00, '#0a0a0a');

    const mG_lip = ctx.createLinearGradient(0, 0, CW, 0);
    mG_lip.addColorStop(0, '#333'); mG_lip.addColorStop(0.5, '#ddd'); mG_lip.addColorStop(1, '#111');

    // Bottom Base
    cylinderPath(ctx, 0, CYL_Y_BOT, CH - EL_H_OUTER, CW, EL_H_OUTER);
    ctx.fillStyle = mG; ctx.fill();
    drawEllipse(0, CYL_Y_BOT, CW, EL_H_OUTER, mG_lip);

    // Top Cap
    cylinderPath(ctx, 0, EL_H_OUTER, CYL_Y_TOP, CW, EL_H_OUTER);
    ctx.fillStyle = mG; ctx.fill();
    drawEllipse(0, EL_H_OUTER, CW, EL_H_OUTER, mG_lip);

    // Inner recess in top cap
    drawEllipse(6, EL_H_OUTER + 2, CW - 12, EL_H_OUTER - 4, '#151515');
    // Bung in center
    drawEllipse(CW/2 - 16, EL_H_OUTER + 2, 32, 12, mG);

    // Thick glass sides reflection
    ctx.fillStyle = mG;
    ctx.fillRect(0, CYL_Y_TOP, CYL_X_INNER, CYL_Y_BOT - CYL_Y_TOP);
    ctx.fillRect(CW - CYL_X_INNER, CYL_Y_TOP, CYL_X_INNER, CYL_Y_BOT - CYL_Y_TOP);

    // Glass curve lines top & bottom
    ctx.beginPath();
    ctx.ellipse(CW/2, CYL_Y_BOT, CYL_W_INNER/2, EL_H_INNER, 0, 0, Math.PI);
    ctx.lineWidth = 3;
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.stroke();

    // Protective Ribs (Hoops)
    const midY1 = CYL_Y_TOP + (CYL_Y_BOT - CYL_Y_TOP) * 0.33;
    const midY2 = CYL_Y_TOP + (CYL_Y_BOT - CYL_Y_TOP) * 0.66;
    [midY1, midY2].forEach(y => {
      cylinderPath(ctx, -2, y - 6, y + 6, CW + 4, EL_H_OUTER + 2);
      ctx.fillStyle = mG; ctx.fill();
      ctx.beginPath();
      ctx.ellipse(CW/2, y + 6, (CW+4)/2, EL_H_OUTER + 2, 0, 0, Math.PI);
      ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.stroke();
    });

    // Glass front highlight
    ctx.save();
    cylinderPath(ctx, CYL_X_INNER, CYL_Y_TOP, CYL_Y_BOT, CYL_W_INNER, EL_H_INNER);
    ctx.clip();
    const gG = ctx.createLinearGradient(CW*0.2, 0, CW*0.45, 0);
    gG.addColorStop(0, 'rgba(255,255,255,0)');
    gG.addColorStop(0.5, 'rgba(255,255,255,0.18)');
    gG.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = gG;
    ctx.fillRect(0, 0, CW, CH);
    ctx.restore();

    requestAnimationFrame(renderBeer);
  }

  renderBeer();
  /* ───────── END BEER CANVAS ───────── */

  /* ── Update UI ── */
  function updateVisuals(k) {
    const name  = k.beer_name        || 'EMPTY TAP';
    const pct   = k.remaining_pct    || 0;
    const temp  = k.current_temp     || 0;
    const co2   = k.current_co2      || 0;
    const flow  = k.current_flow     || 0;
    const logo  = k.library_logo     || k.logo_path || null;

    curLevel   = pct;
    flowActive = flow > 0;

    /* Name */
    document.getElementById('txtName').textContent = name;

    /* Temperature gauge */
    setGaugeFill('gFillTemp', 'gGlowTemp', temp, 0, 20);
    document.getElementById('gValTemp').textContent = temp.toFixed(1);

    /* CO2 gauge — scaled to BAR (0-5) */
    setGaugeFill('gFillCo2', 'gGlowCo2', co2, 0, 5);
    document.getElementById('gValCo2').textContent = co2.toFixed(2);

    /* Canvas beer level — set target fill */
    beerTargetLevel = pct / 100;

    /* Big centered % (subtle, inside tube) */
    const bigPct = document.getElementById('bigPct');
    bigPct.textContent = Math.round(pct) + '%';

    /* Outside info panel */
    const infoPct   = document.getElementById('infoPct');
    const infoLit   = document.getElementById('infoLiters');
    const infoBadge = document.getElementById('infoBadge');
    const liters    = ((pct / 100) * 50).toFixed(1); // 50L keg

    infoPct.textContent = Math.round(pct) + '%';
    infoLit.innerHTML   = `${liters}<span class="info-liters-lbl"> L</span>`;

    const pctColor = pct < 15 ? '#ef4444' : pct < 30 ? '#f97316' : '#f59e0b';
    infoPct.style.color      = pctColor;
    infoPct.style.textShadow = `0 0 30px ${pctColor}99, 0 0 80px ${pctColor}55, 0 4px 20px rgba(0,0,0,0.8)`;
    infoLit.style.color      = pctColor;

    if (flow > 0) {
      infoBadge.textContent  = 'POURING';
      infoBadge.style.color  = '#22c55e';
      infoBadge.style.boxShadow = '0 0 20px rgba(34,197,94,0.4)';
    } else if (pct < 15) {
      infoBadge.textContent  = 'CRITICAL';
      infoBadge.style.color  = '#ef4444';
      infoBadge.style.boxShadow = '0 0 20px rgba(239,68,68,0.5)';
    } else if (pct < 30) {
      infoBadge.textContent  = 'LOW';
      infoBadge.style.color  = '#f97316';
      infoBadge.style.boxShadow = '0 0 20px rgba(249,115,22,0.4)';
    } else {
      infoBadge.textContent  = 'GOOD';
      infoBadge.style.color  = '#22c55e';
      infoBadge.style.boxShadow = 'none';
    }

    /* Level state */
    const frame = document.getElementById('levelFrame');
    frame.className = 'level-frame';
    if (pct < 15)      frame.classList.add('level--crit');
    else if (pct < 30) frame.classList.add('level--low');
    else               frame.classList.add('level--ok');

    if (flowActive) frame.classList.add('pouring');

    /* Gauge colour on warning */
    const tempEl = document.getElementById('gValTemp');
    if (temp > 8) {
      tempEl.style.color      = '#ef4444';
      tempEl.style.textShadow = '0 0 30px rgba(239,68,68,0.7)';
      document.getElementById('gFillTemp').style.stroke = '#ef4444';
    } else {
      tempEl.style.color      = '#f59e0b';
      tempEl.style.textShadow = '0 0 30px rgba(245,158,11,0.6)';
      document.getElementById('gFillTemp').style.stroke = '#f59e0b';
    }

    pctEl.style.color = pct < 15 ? '#ef4444' : pct < 30 ? '#f97316' : '#f59e0b';

    /* Status pill — no emojis */
    const pill = document.getElementById('txtStatus');
    if (flow > 0) {
      pill.textContent   = 'POURING NOW';
      pill.style.color   = '#22c55e';
    } else if (pct < 15) {
      pill.textContent   = 'KEG CRITICAL';
      pill.style.color   = '#ef4444';
    } else if (pct < 30) {
      pill.textContent   = 'KEG RUNNING LOW';
      pill.style.color   = '#f97316';
    } else if (co2 > 2.8) {
      pill.textContent   = 'CO2 HIGH';
      pill.style.color   = '#38bdf8';
    } else if (co2 < 0.4) {
      pill.textContent   = 'CO2 LOW';
      pill.style.color   = '#a78bfa';
    } else if (temp > 8) {
      pill.textContent   = 'TEMP WARNING';
      pill.style.color   = '#f59e0b';
    } else {
      pill.textContent   = 'STABLE';
      pill.style.color   = 'rgba(255,255,255,0.4)';
    }

    /* Alert overlay — supports keg AND co2 alerts */
    const alertEl    = document.getElementById('alertOverlay');
    const alertText  = document.getElementById('alertText');
    const alertSub   = document.getElementById('alertSub');
    
    const co2High = co2 > 2.8;
    const co2Low  = co2 < 0.4;

    if (pct < 15) {
      alertEl.classList.add('show');
      alertEl.style.borderColor = '#ef4444';
      alertEl.style.background  = 'rgba(239,68,68,0.15)';
      alertText.textContent  = 'REPLACE KEG';
      alertText.style.color  = '#ef4444';
      alertSub.textContent   = `Level Critical — ${Math.round(pct)}% remaining`;
    } else if (co2High) {
      alertEl.classList.add('show');
      alertEl.style.borderColor = '#38bdf8';
      alertEl.style.background  = 'rgba(56,189,248,0.1)';
      alertText.textContent  = 'CO2 PRESSURE HIGH';
      alertText.style.color  = '#38bdf8';
      alertSub.textContent   = `Current: ${co2.toFixed(2)} BAR — Check regulator`;
    } else if (co2Low) {
      alertEl.classList.add('show');
      alertEl.style.borderColor = '#a78bfa';
      alertEl.style.background  = 'rgba(167,139,250,0.1)';
      alertText.textContent  = 'CO2 TANK EMPTY';
      alertText.style.color  = '#a78bfa';
      alertSub.textContent   = `Pressure at ${co2.toFixed(2)} BAR — Replace bottle`;
    } else {
      alertEl.classList.remove('show');
    }
  }

  /* ── Bubble particle system ── */
  function spawnBubble() {
    if (curLevel < 3) return;
    const layer  = document.getElementById('bubbleLayer');
    const b      = document.createElement('div');
    const size   = 3 + Math.random() * 6;
    const left   = 10 + Math.random() * 80;
    const dur    = 3 + Math.random() * 4 + (flowActive ? -1 : 0);

    b.className = 'bubble';
    b.style.cssText = `
      width:${size}px; height:${size}px;
      left:${left}%; bottom:0%;
      animation-duration:${dur}s;
      animation-delay:${Math.random() * 2}s;
    `;
    layer.appendChild(b);
    setTimeout(() => b.remove(), (dur + 2) * 1000);
  }
  setInterval(spawnBubble, 600);

  /* ── SSE Stream ── */
  function initStream() {
    const es = new EventSource(`/api/mqtt/stream`);
    es.onmessage = e => {
      try {
        const msg = JSON.parse(e.data);
        const topic = `keghero/display/${DISPLAY_ID}/kegs`;
        if (msg.topic === topic) updateVisuals(msg.payload);
      } catch {}
    };
    es.onerror = () => setTimeout(initStream, 3000);
  }
  initStream();

  /* ── SHOWCASE DEMO — cycles through all states ── */
  if (params.get('demo') === 'true') {

    const scenarios = [
      {
        label: 'Normal Operation',
        beer_name: 'Heineken Draft',
        remaining_pct: 82,
        current_temp: 4.2,
        current_co2: 1.45,  // BAR
        current_flow: 0
      },
      {
        label: 'Pouring',
        beer_name: 'Heineken Draft',
        remaining_pct: 80,
        current_temp: 4.3,
        current_co2: 1.42,
        current_flow: 1.8
      },
      {
        label: 'Keg Running Low',
        beer_name: 'Guinness Stout',
        remaining_pct: 24,
        current_temp: 5.1,
        current_co2: 1.38,
        current_flow: 0
      },
      {
        label: 'KEG CRITICAL',
        beer_name: 'Guinness Stout',
        remaining_pct: 9,
        current_temp: 5.4,
        current_co2: 1.35,
        current_flow: 0
      },
      {
        label: 'CO2 Pressure High',
        beer_name: 'Stella Artois',
        remaining_pct: 61,
        current_temp: 4.8,
        current_co2: 3.1,   // HIGH BAR
        current_flow: 0
      },
      {
        label: 'CO2 Tank Empty',
        beer_name: 'Stella Artois',
        remaining_pct: 55,
        current_temp: 4.6,
        current_co2: 0.2,   // EMPTY BAR
        current_flow: 0
      },
      {
        label: 'Temp Warning',
        beer_name: 'Corona Extra',
        remaining_pct: 47,
        current_temp: 9.8,
        current_co2: 1.51,
        current_flow: 0
      }
    ];

    let idx = 0;

    function runScenario() {
      const s = scenarios[idx];
      // Add small random variation so values feel live
      updateVisuals({
        beer_name:      s.beer_name,
        remaining_pct:  s.remaining_pct + (Math.random() - 0.5) * 2,
        current_temp:   s.current_temp  + (Math.random() - 0.5) * 0.3,
        current_co2:    s.current_co2   + (Math.random() - 0.5) * 0.4,
        current_flow:   s.current_flow
      });
      idx = (idx + 1) % scenarios.length;
    }

    runScenario();
    setInterval(runScenario, 4000); // switch scenario every 4 seconds
  }

  /* ── Test Level ── */
  const testLevel = params.get('testLevel');
  if (testLevel !== null) {
    updateVisuals({
      beer_name: 'TEST MODE',
      remaining_pct: parseFloat(testLevel),
      current_temp: 4.2,
      current_co2: 1.45,
      current_flow: 0
    });
  }
</script>
