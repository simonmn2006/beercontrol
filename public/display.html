<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KegHero | Live Display HD</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&family=Inter:wght@400;700;800&family=JetBrains+Mono:wght@700;800&display=swap');

    :root {
      /* Base Colors (Industrial Theme Default) */
      --bg: #050506;
      --keg-metal: #a1a1aa;
      --keg-rim: #52525b;
      --beer-main: #f59e0b;
      --beer-dark: #b45309;
      --foam: #fdf6e3;
      --amber: #f8fafc;
      --accent: #3b82f6;
      --text: #ffffff;
      --fm: 'Inter', sans-serif;
      --ft: 'Big Shoulders Display', sans-serif;
      --fmono: 'JetBrains Mono', monospace;
    }

    /* ── THEME TOKENS V2 ── */
    [data-theme="industrial"] {
      --bg: url('/public/img/v2_industrial.png');
      --accent: #ffb433; /* Neon Amber */
      --beer-main: #f59e0b;
      --ft: 'Oswald', sans-serif;
      --fmono: 'Share Tech Mono', monospace;
    }
    [data-theme="modern"] {
      --bg: url('/public/img/v2_modern.png');
      --accent: #00f2ff; /* Neon Cyan */
      --beer-main: #fef08a;
      --ft: 'Inter', sans-serif;
      --fmono: 'Roboto Mono', monospace;
    }
    [data-theme="crafthouse"] {
      --bg: url('/public/img/v2_crafthouse.png');
      --accent: #fcd34d; /* Brass Gold */
      --beer-main: #d97706;
      --ft: 'Playfair Display', serif;
      --fmono: 'Space Mono', monospace;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--fm);
      width: 720px;
      height: 1560px;
      overflow: hidden;
      margin: 0 auto;
      position: relative;
      /* Immersive Background */
      background: radial-gradient(circle at 50% 30%, rgba(59, 130, 246, 0.05) 0%, transparent 70%), var(--bg);
    }

    /* ── MESH GRIDS & LIGHTS ── */
    .kiosk-wrapper {
      width: 100%; height: 100%; position: relative;
      background-size: cover; background-position: center;
      display: flex; flex-direction: column; align-items: center;
      transition: background-image 1.5s ease-in-out;
    }
    
    [data-theme="industrial"] .kiosk-wrapper { background-image: var(--bg); }
    [data-theme="modern"] .kiosk-wrapper { background-image: var(--bg); }
    [data-theme="crafthouse"] .kiosk-wrapper { background-image: var(--bg); }

    /* ── LIQUID WINDOW (Positioned over the skin's window) ── */
    /* ── LIQUID WINDOW ALIGNMENT V2 ── */
    .liquid-window {
      position: absolute;
      overflow: hidden; z-index: 5;
      background: #000;
      box-shadow: inset 0 0 80px rgba(0,0,0,0.9);
      will-change: transform;
    }
    
    [data-theme="industrial"] .liquid-window { 
      width: 145px; height: 600px;
      top: 236px; left: 50%; transform: translateX(-50%);
      border-radius: 72px;
    }
    [data-theme="modern"] .liquid-window { 
      width: 120px; height: 350px;
      top: 36%; left: 50%; transform: translateX(-50%);
      border-radius: 60px;
    }
    [data-theme="crafthouse"] .liquid-window { 
      width: 220px; height: 435px;
      top: 334px; left: 71%; transform: translateX(-50%);
      border-radius: 20px;
    }

    /* ── DATA CARDS V2 (Production Ready) ── */
    .data-card {
      position: absolute;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      pointer-events: none; z-index: 15;
    }
    .card-val { 
      font-size: 110px; font-family: var(--fmono); font-weight: 900; 
      line-height: 1; color: var(--accent); 
      filter: drop-shadow(0 0 20px var(--accent));
      margin-bottom: 10px;
    }
    .card-lbl { 
      font-size: 20px; font-weight: 800; letter-spacing: 2px; opacity: 0.6;
      text-transform: uppercase;
    }

    [data-theme="industrial"] .card-temp { top: 435px; left: 140px; }
    [data-theme="industrial"] .card-psi { top: 435px; right: 140px; }

    [data-theme="modern"] .card-temp { top: 320px; left: 160px; }
    [data-theme="modern"] .card-psi { top: 600px; left: 160px; }

    [data-theme="crafthouse"] .card-temp { top: 388px; left: 322px; transform: translateX(-50%); }
    [data-theme="crafthouse"] .card-psi { top: 604px; left: 322px; transform: translateX(-50%); }

    .mist-layer {
      position: absolute; inset: 0;
      background: url('/public/img/mist.png');
      background-size: cover;
      opacity: 0.2; mix-blend-mode: lighten;
      pointer-events: none; z-index: 10;
    }
    
    .refraction-container {
      position: absolute; inset: 0;
      z-index: 4; /* Behind the frame/mist, on top of the liquid */
      pointer-events: none;
    }

    .liquid-svg { 
      width: 100%; height: 100%; display: block; position: absolute; inset: 0; z-index: 2; 
      will-change: transform; transform: translate3d(0,0,0); /* Hardware Acceleration */
    }
    
    [data-theme="crafthouse"] {
      --interior-glow: rgba(180, 83, 9, 0.4);
    }

    /* ── TOP HEADER ── */
    .header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; padding: 0 40px; }
    .live-tag {
      background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 40px; padding: 6px 16px;
      display: flex; align-items: center; gap: 8px; font-family: var(--fmono); font-size: 14px; color: #ef4444; text-transform: uppercase; letter-spacing: 1px;
    }
    .live-dot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; box-shadow: 0 0 10px #ef4444; animation: blink 1s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } }

    .brand { font-family: var(--ft); font-size: 32px; font-weight: 900; letter-spacing: 4px; opacity: 0.6; }

    /* ── MAIN DISPLAY AREA ── */
    .main-body { flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; position: relative; }

    /* GAUGES */
    .gauge-column { position: absolute; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 400px; z-index: 10; }
    .gauge-left { left: 40px; }
    .gauge-right { right: 40px; }

    .gauge-mini { text-align: center; }
    .mini-label { font-family: var(--ft); font-size: 20px; color: rgba(255,255,255,0.4); margin-bottom: 8px; letter-spacing: 2px; text-transform: uppercase; }
    .mini-svg { width: 140px; height: 140px; }
    .mini-val { font-family: var(--fmono); font-size: 32px; font-weight: 700; margin-top: -85px; }
    .mini-unit { font-size: 12px; opacity: 0.4; font-weight: 600; margin-top: 4px; }

    /* ── THE KEG ── */
    .keg-container { position: relative; width: 500px; height: 900px; }
    
    /* Keg Shine/Glow */
    .keg-backlight { 
      position: absolute; inset: -50px; 
      background: radial-gradient(circle, rgba(245, 158, 11, 0.1) 0%, transparent 70%); 
      filter: blur(40px); z-index: 0;
    }

    /* Vertical Percentage on Side */
    .pct-wall {
      position: absolute; right: 20px; top: 100px; bottom: 100px; width: 40px;
      display: flex; flex-direction: column; justify-content: space-between; align-items: center;
      font-family: var(--fmono); font-size: 11px; color: rgba(255,255,255,0.2); z-index: 5;
    }
    .pct-marker { width: 10px; height: 1px; background: rgba(255,255,255,0.1); }
    .pct-active-label { 
      position: absolute; right: 45px; transform: translateY(-50%);
      font-size: 18px; font-weight: 800; color: var(--beer-main); transition: top 0.5s ease;
    }

    .keg-svg { width: 100%; height: 100%; filter: drop-shadow(0 40px 80px rgba(0,0,0,0.8)); transition: filter 1s ease; }

    /* Theme Adjustments */
    [data-theme="modern"] .keg-backlight { background: radial-gradient(circle, rgba(34, 211, 238, 0.15) 0%, transparent 70%); }
    [data-theme="crafthouse"] .keg-backlight { background: radial-gradient(circle, rgba(180, 83, 9, 0.15) 0%, transparent 70%); }

    [data-theme="modern"] .mini-svg circle#gTemp { stroke: #22d3ee; filter: drop-shadow(0 0 5px #22d3ee); }
    [data-theme="modern"] .mini-svg circle#gFlow { stroke: #60a5fa; filter: drop-shadow(0 0 5px #60a5fa); }
    [data-theme="modern"] .mini-svg circle#gCo2 { stroke: #818cf8; filter: drop-shadow(0 0 5px #818cf8); }

    [data-theme="crafthouse"] {
      background: radial-gradient(circle at 50% 20%, #1c1917 0%, #0c0a09 100%);
    }
    [data-theme="crafthouse"] .mini-svg circle { stroke-width: 10; }
    [data-theme="crafthouse"] .mini-label { color: #fcd34d; font-family: serif; }

    /* GAUGES CLUSTER */
    .gauge-mini {
      text-align: center; width: 140px; margin-bottom: 40px;
      background: radial-gradient(circle at 30% 30%, #1a1a1a, #000);
      border: 4px solid #111; border-radius: 50%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 10px rgba(255,255,255,0.05);
      position: relative; padding: 15px;
    }
    
    /* DATA OVERLAYS */
    .data-overlay { position: absolute; z-index: 10; pointer-events: none; }
    
    .overlay-temp { top: 410px; left: 160px; text-align: center; }
    .overlay-co2 { top: 410px; right: 160px; text-align: center; }
    
    [data-theme="modern"] .overlay-temp { top: 380px; left: 240px; }
    [data-theme="modern"] .overlay-co2 { top: 380px; right: 240px; }

    .ov-val { font-family: var(--fmono); font-size: 28px; font-weight: 900; color: #fff; text-shadow: 0 0 10px var(--glow); }
    .ov-lbl { font-size: 10px; font-weight: 800; opacity: 0.6; letter-spacing: 1px; color: var(--accent); }

    .brand-overlay {
      position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
      font-family: var(--ft); font-size: 32px; font-weight: 900; letter-spacing: 6px;
      opacity: 0.4; text-shadow: 0 1px 5px rgba(0,0,0,0.5); z-index: 10;
    }
    
    .logo-badge-overlay {
      position: absolute; top: 41%; left: 50%; transform: translate(-50%, -50%);
      width: 320px; height: 320px; z-index: 3;
      display: flex; align-items: center; justify-content: center;
      transition: filter 0.8s ease-in-out;
    }
    .badge-img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 30px var(--glow)); transform: scale(1.1); }

    /* ── FOOTER DATA ── */
    .footer { width: 100%; text-align: center; padding: 20px 0 80px 0; }
    .brand-logo-img { max-width: 380px; filter: drop-shadow(0 5px 20px rgba(0,0,0,0.8)); opacity: 0.95; }
    
    .remaining-tag {
      margin-top: -20px; font-family: var(--fmono); font-size: 24px; color: var(--beer-main); font-weight: 800; letter-spacing: 2px;
    }

    /* ── ALERT OVERLAY ── */
    #alertOverlay {
      position: fixed; inset: 0; background: rgba(239, 68, 68, 0.2); 
      backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 100;
      animation: alertPulse 2s infinite ease-in-out; pointer-events: none;
    }
    @keyframes alertPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
    .alert-msg { font-family: var(--ft); font-size: 80px; font-weight: 950; color: #fff; text-shadow: 0 0 40px #ef4444; }

  </style>
</head>
<body>

<div id="alertOverlay"><span class="alert-msg">LOW KEG LEVEL</span></div>

<div class="kiosk-wrapper">
  
  <!-- DATA CARDS (Top Priority) -->
  <div class="data-card card-temp">
    <div class="card-val"><span id="valTemp">0.0</span>°</div>
    <div class="card-lbl">PRODUCT TEMP</div>
  </div>

  <div class="data-card card-psi">
    <div class="card-val"><span id="valCo2">0.0</span></div>
    <div class="card-lbl">PSI PRESSURE</div>
  </div>

  <div class="liquid-window">
    <div class="mist-layer"></div>
    <div class="beer-live-texture"></div>
    
    <svg class="liquid-svg" viewBox="0 0 500 900" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- REFRACTION SHADER -->
        <filter id="liquidRefraction" x="0" y="0" width="100%" height="100%">
          <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" result="noise" />
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="20" xChannelSelector="R" yChannelSelector="G" />
        </filter>

        <mask id="windowMask">
          <rect id="beerFill" x="0" y="800" width="500" height="900" fill="white" />
          <path id="wavePath" d="" fill="white" />
        </mask>
      </defs>
      
      <!-- Interior Background -->
      <rect x="0" y="0" width="500" height="900" fill="#0c0701" opacity="0.4" />

      <!-- The 'Head' (Foam) -->
      <path id="foamPath" d="" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="40" stroke-linecap="round" filter="blur(5px)" />
      
      <!-- Liquid Fill (Tinting the texture) -->
      <g mask="url(#windowMask)">
         <rect x="0" y="0" width="500" height="900" fill="var(--beer-main)" opacity="0.3" />
      </g>

      <g id="bubbleLayer"></g>
    </svg>
  </div>

  <div class="logo-badge-overlay">
    <div id="badgeLogoContainer">🍺</div>
  </div>

  <div class="footer">
    <img src="/public/img/brand_logo.png" class="brand-logo-img">
    <div class="remaining-tag" id="txtPct">0% REMAINING</div>
  </div>

</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const theme = params.get('theme') || 'industrial';
  const testLevel = params.get('testLevel'); // For easy user testing
  document.body.setAttribute('data-theme', theme);

  const DISPLAY_ID = window.location.pathname.split('/').pop();
  
  // DOM
  const elLevel = document.getElementById('beerFill');
  const elWave = document.getElementById('wavePath');
  const elFoam = document.getElementById('foamPath');
  const elGlow = document.getElementById('kegGlow');
  const elLogo = document.getElementById('badgeLogoContainer');
  const elAlert = document.getElementById('alertOverlay');

  let flowIntensity = 0;
  let waveTime = 0;

  function setGauge(id, val, max) {
    const el = document.getElementById(id);
    const circ = 283;
    const progress = Math.min(val/max, 1);
    el.style.strokeDasharray = `${progress * circ} ${circ}`;
  }

  function updateVisuals(k) {
    const name = k.beer_name || "EMPTY TAP";
    const pct = k.remaining_pct || 0;
    const ltr = k.remaining_liters || 0;
    const temp = k.current_temp || 0;
    const co2 = k.current_co2 || 0;
    const flow = k.current_flow || 0;
    
    flowIntensity = flow > 0 ? flow : 0;

    document.getElementById('txtName').textContent = name;
    document.getElementById('txtPct').textContent = Math.round(pct) + '% REMAINING';
    document.getElementById('valTemp').textContent = temp.toFixed(1);
    document.getElementById('valCo2').textContent = co2.toFixed(1);

    // ADAPTIVE LIGHTING
    const glowScale = 0.5 + (1 - (pct/100)) * 0.5;
    document.querySelector('.liquid-window').style.boxShadow = `inset 0 0 ${100 * glowScale}px rgba(0,0,0,0.9)`;
    
    // DYNAMIC REFRACTION: Only refract if submerged
    const badge = document.querySelector('.logo-badge-overlay');
    if (pct > 60) {
      badge.style.filter = 'url(#liquidRefraction) drop-shadow(0 0 20px rgba(255,255,255,0.2)) blur(1px)';
    } else {
      badge.style.filter = 'none';
      badge.style.zIndex = '20'; // Bring to front when above water
    }

    // Liquid Height Logic (SVG y: 80 to 820)
    const startY = 820;
    const endY = 80;
    const currentY = startY - ((startY - endY) * (pct / 100));
    
    elLevel.setAttribute('y', currentY);
    elLevel.setAttribute('height', 820 - currentY);
    
    // Wave Control
    window.currentLiquidY = currentY;
    document.getElementById('pctFloating').style.top = `${100 - pct}%`;
    document.getElementById('pctFloating').textContent = Math.round(pct) + '%';

    if (k.logo_path || k.library_logo) {
      elLogo.innerHTML = `<img src="${k.library_logo || k.logo_path}" class="badge-img">`;
    } else {
      elLogo.innerHTML = '<span style="font-size:120px">🍺</span>';
    }

    elAlert.style.display = (pct < 15) ? 'flex' : 'none';
  }

  // Liquid Physics Engine
  function animateLiquid() {
    waveTime += 0.05 + (flowIntensity * 0.05);
    const y = window.currentLiquidY || 820;
    const amp = 5 + (flowIntensity * 15);
    const freq = 0.02;

    const x1 = 25, x2 = 125, x3 = 250, x4 = 375, x5 = 475;
    const w1 = y + Math.sin(waveTime) * amp;
    const w2 = y + Math.cos(waveTime * 0.8) * amp;
    const w3 = y + Math.sin(waveTime * 1.2) * amp;

    const d = `M ${x1} ${y} Q ${x2} ${w1} ${x3} ${w2} T ${x5} ${w3} V 900 H ${x1} Z`;
    const dFoam = `M ${x1} ${y} Q ${x2} ${w1} ${x3} ${w2} T ${x5} ${w3}`;
    
    elWave.setAttribute('d', d);
    elFoam.setAttribute('d', dFoam);

    requestAnimationFrame(animateLiquid);
  }

  // Particle System (Bubbles)
  const bubbleLayer = document.getElementById('bubbleLayer');
  function spawnBubble() {
    if (window.currentLiquidY > 810) return; // empty
    
    const b = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    const r = Math.random() * 3 + 1;
    const x = 50 + Math.random() * 400;
    b.setAttribute('cx', x);
    b.setAttribute('cy', 850);
    b.setAttribute('r', r);
    b.setAttribute('fill', 'white');
    b.setAttribute('opacity', Math.random() * 0.5);
    bubbleLayer.appendChild(b);

    const speed = 2 + Math.random() * 4 + (flowIntensity * 5);
    let curY = 850;
    
    const up = () => {
      curY -= speed;
      b.setAttribute('cy', curY);
      if (curY < (window.currentLiquidY || 820)) {
        b.remove();
      } else {
        requestAnimationFrame(up);
      }
    };
    up();
  }

  setInterval(() => {
    const total = 1 + Math.floor(flowIntensity * 5);
    for(let i=0; i<total; i++) spawnBubble();
  }, 200);

  // SSE Stream
  function initStream() {
    const source = new EventSource('/api/mqtt/stream');
    source.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      if (msg.type === 'message') {
        const topic = msg.data.topic;
        const data = msg.data.data;

        // Custom logic: if topic matches display-specific or general tap update
        // For simplicity, let's assume the server pushes /keghero/display/:id/kegs
        if (topic === `keghero/display/${DISPLAY_ID}/kegs`) {
          if (data.kegs && data.kegs.length > 0) {
            updateVisuals(data.kegs[0]);
          }
        }
      }
    };
  }

  initStream();
  animateLiquid();

  // Handle Testing Levels
  if (testLevel !== null) {
    setTimeout(() => {
      updateVisuals({
        beer_name: 'TEST MODE: ' + testLevel + '%',
        remaining_pct: parseFloat(testLevel),
        current_temp: 4.2,
        current_flow: 0,
        current_co2: 12.5
      });
    }, 500);
  }
</script>
</body>
</html>
