<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, height=1560, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KegHero Live Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-user-select: none; user-select: none;
    }

    body, html {
      width: 750px; height: 1560px;
      background: #0a0a0f;
      color: #fff;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* ── BACKGROUND ── */
    .screen {
      width: 750px; height: 1560px;
      position: relative;
      background:
        radial-gradient(ellipse 600px 400px at 50% 0%, rgba(245,158,11,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 800px 600px at 50% 100%, rgba(30,20,5,0.9) 0%, transparent 80%),
        linear-gradient(180deg, #0d0d12 0%, #080810 50%, #0a0906 100%);
    }

    /* ── HEADER ── */
    .header {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 50px 50px 30px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%);
    }

    .live-badge {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 700; letter-spacing: 3px;
      color: rgba(255,255,255,0.4); text-transform: uppercase;
    }
    .live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 12px #22c55e;
      animation: blink 2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .beer-name {
      font-size: 72px; font-weight: 900;
      text-align: center; line-height: 1;
      text-shadow: 0 0 60px rgba(245,158,11,0.4);
      letter-spacing: -1px;
    }

    .status-pill {
      padding: 8px 28px; border-radius: 100px;
      font-size: 15px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase;
      border: 1px solid currentColor;
      transition: all 0.4s ease;
    }

    /* ── GAUGES ROW ── */
    .gauges-row {
      position: absolute; top: 320px; left: 0; right: 0;
      display: flex; justify-content: space-around; align-items: center;
      padding: 0 40px;
    }

    .gauge-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }

    .gauge-ring {
      position: relative; width: 280px; height: 280px;
    }
    .gauge-ring svg {
      width: 100%; height: 100%;
      transform: rotate(-90deg);
      overflow: visible;
    }
    .g-bg {
      fill: none;
      stroke: rgba(255,255,255,0.04);
      stroke-width: 10;
    }
    .g-track {
      fill: none;
      stroke: rgba(255,255,255,0.07);
      stroke-width: 10;
      stroke-dasharray: 659 659;
    }
    .g-fill {
      fill: none;
      stroke-width: 10;
      stroke-linecap: round;
      stroke-dasharray: 0 659;
      transition: stroke-dasharray 1.2s cubic-bezier(0.4, 0, 0.2, 1),
                  stroke 0.5s ease;
    }
    .g-tick { stroke: rgba(255,255,255,0.08); stroke-width: 2; }

    .gauge-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .gauge-value {
      font-size: 80px; font-weight: 800;
      font-family: 'JetBrains Mono', monospace;
      line-height: 1;
      transition: color 0.5s ease, text-shadow 0.5s ease;
    }
    .gauge-unit {
      font-size: 18px; font-weight: 700;
      opacity: 0.4; margin-top: 4px; letter-spacing: 2px;
    }
    .gauge-label {
      font-size: 15px; font-weight: 800; letter-spacing: 3px;
      text-transform: uppercase; opacity: 0.5;
    }
    .trend { font-size: 22px; margin-left: 4px; vertical-align: middle; }

    /* ── BEER LEVEL COLUMN ── */
    .level-section {
      position: absolute; top: 740px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 0;
    }

    .level-header {
      font-size: 14px; font-weight: 800; letter-spacing: 4px;
      opacity: 0.35; text-transform: uppercase; margin-bottom: 20px;
    }

    .level-frame {
      position: relative;
      width: 130px; height: 600px;
    }

    /* Outer casing */
    .level-casing {
      position: absolute; inset: 0;
      border-radius: 65px;
      border: 2px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.02);
      box-shadow:
        inset 0 0 40px rgba(0,0,0,0.8),
        0 0 0 1px rgba(255,255,255,0.03);
    }

    /* Inner fill track */
    .level-track {
      position: absolute; inset: 8px;
      border-radius: 57px;
      background: rgba(0,0,0,0.6);
      overflow: hidden;
    }

    .level-fill {
      position: absolute; bottom: 0; left: 0; right: 0;
      border-radius: 57px;
      transition: height 1.2s cubic-bezier(0.4, 0, 0.2, 1),
                  background 0.8s ease, box-shadow 0.8s ease;
      background: linear-gradient(180deg, #fde68a 0%, #f59e0b 40%, #d97706 100%);
      box-shadow: 0 -10px 40px rgba(245,158,11,0.5), 0 0 80px rgba(245,158,11,0.2);
    }

    /* Wave on top of fill */
    .wave-overlay {
      position: absolute; top: 0; left: 0; right: 0; height: 30px;
      background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 100%);
      border-radius: 57px 57px 0 0;
    }

    /* Tick marks */
    .level-ticks {
      position: absolute; top: 8px; right: -28px; bottom: 8px;
      display: flex; flex-direction: column; justify-content: space-between;
      align-items: flex-start;
    }
    .tick {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      color: rgba(255,255,255,0.25);
    }
    .tick-line { width: 10px; height: 1px; background: rgba(255,255,255,0.15); }
    .tick.major .tick-line { width: 16px; background: rgba(255,255,255,0.3); }

    /* Floating % indicator */
    .pct-indicator {
      position: absolute; left: -90px;
      transform: translateY(-50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 36px; font-weight: 800;
      transition: top 1.2s cubic-bezier(0.4, 0, 0.2, 1),
                  color 0.5s ease;
      text-align: right; white-space: nowrap;
    }

    /* Bubbles */
    .bubble-layer {
      position: absolute; inset: 8px; border-radius: 57px; overflow: hidden;
      pointer-events: none;
    }
    .bubble {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,0.35);
      animation: rise linear infinite;
    }
    @keyframes rise {
      from { transform: translateY(0) scale(1); opacity: 0.5; }
      to { transform: translateY(-620px) scale(0.3); opacity: 0; }
    }

    /* ── FOOTER ── */
    .footer {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 40px 50px 60px;
      background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent 100%);
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }

    .pints-row {
      display: flex; align-items: baseline; gap: 10px;
    }
    .pints-val {
      font-size: 60px; font-weight: 900;
      font-family: 'JetBrains Mono', monospace;
    }
    .pints-lbl {
      font-size: 16px; font-weight: 700; letter-spacing: 3px;
      opacity: 0.4; text-transform: uppercase;
    }

    .beer-logo {
      font-size: 60px;
      filter: drop-shadow(0 0 20px rgba(245,158,11,0.5));
    }

    /* ── ALERT OVERLAY ── */
    #alertOverlay {
      position: fixed; inset: 0; z-index: 999;
      display: none; align-items: center; justify-content: center;
      background: rgba(239, 68, 68, 0.15);
      backdrop-filter: blur(6px);
    }
    #alertOverlay.show { display: flex; }
    .alert-box {
      text-align: center;
      animation: alertPulse 1.2s infinite ease-in-out;
    }
    .alert-icon { font-size: 100px; display: block; }
    .alert-text {
      font-size: 72px; font-weight: 900; letter-spacing: 4px;
      color: #ef4444;
      text-shadow: 0 0 60px rgba(239,68,68,0.8);
    }
    .alert-sub {
      font-size: 22px; opacity: 0.6; margin-top: 10px; letter-spacing: 2px;
    }
    /* Red pulsing border */
    #alertOverlay::before {
      content: ''; position: fixed; inset: 0;
      border: 20px solid #ef4444;
      animation: borderPulse 1.2s infinite ease-in-out;
      pointer-events: none;
    }
    @keyframes alertPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
    @keyframes borderPulse { 0%,100%{opacity:0.8} 50%{opacity:0.2} }

    /* ── LEVEL STATE COLORS ── */
    .level--ok    .level-fill {
      background: linear-gradient(180deg, #fde68a 0%, #f59e0b 40%, #d97706 100%);
      box-shadow: 0 -10px 40px rgba(245,158,11,0.5), 0 0 60px rgba(245,158,11,0.15);
    }
    .level--low   .level-fill {
      background: linear-gradient(180deg, #fed7aa 0%, #f97316 40%, #ea580c 100%);
      box-shadow: 0 -10px 40px rgba(249,115,22,0.7), 0 0 60px rgba(249,115,22,0.2);
    }
    .level--crit  .level-fill {
      background: linear-gradient(180deg, #fecaca 0%, #ef4444 40%, #dc2626 100%);
      box-shadow: 0 -10px 40px rgba(239,68,68,0.8), 0 0 60px rgba(239,68,68,0.3);
      animation: critPulse 1.2s infinite;
    }
    @keyframes critPulse {
      0%,100% { box-shadow: 0 -10px 40px rgba(239,68,68,0.8); }
      50%     { box-shadow: 0 -20px 80px rgba(239,68,68,1.0); }
    }

    /* pour animation */
    .pouring .level-fill { animation: pourShimmer 0.3s infinite; }
    @keyframes pourShimmer { 0%,100%{opacity:1} 50%{opacity:0.85} }
  </style>
</head>
<body>

<div id="alertOverlay">
  <div class="alert-box">
    <span class="alert-icon">⚠️</span>
    <div class="alert-text">REPLACE KEG</div>
    <div class="alert-sub">Level Critical — Act Now</div>
  </div>
</div>

<div class="screen">

  <!-- HEADER -->
  <div class="header">
    <div class="live-badge">
      <div class="live-dot"></div>
      LIVE TAP FEED
    </div>
    <div class="beer-name" id="txtName">LOADING…</div>
    <div class="status-pill" id="txtStatus">SYSTEM READY</div>
  </div>

  <!-- GAUGES -->
  <div class="gauges-row">

    <!-- TEMPERATURE -->
    <div class="gauge-wrap">
      <div class="gauge-ring">
        <svg viewBox="0 0 100 100">
          <!-- tick marks -->
          <g transform="translate(50,50)">
            <line class="g-tick" x1="0" y1="-46" x2="0" y2="-40" transform="rotate(-135)"/>
            <line class="g-tick" x1="0" y1="-46" x2="0" y2="-42" transform="rotate(-90)"/>
            <line class="g-tick" x1="0" y1="-46" x2="0" y2="-40" transform="rotate(-45)"/>
            <line class="g-tick" x1="0" y1="-46" x2="0" y2="-42" transform="rotate(0)"/>
            <line class="g-tick" x1="0" y1="-46" x2="0" y2="-40" transform="rotate(45)"/>
          </g>
          <circle class="g-bg" cx="50" cy="50" r="42"/>
          <circle class="g-track" cx="50" cy="50" r="42"
            stroke-dasharray="220 659"
            stroke-dashoffset="-110"/>
          <circle class="g-fill" id="gFillTemp" cx="50" cy="50" r="42"
            stroke="#f59e0b"
            stroke-dashoffset="-110"/>
        </svg>
        <div class="gauge-center">
          <span class="gauge-value" id="gValTemp" style="color:#f59e0b; text-shadow:0 0 30px rgba(245,158,11,0.6)">0.0</span>
          <span class="gauge-unit">°C</span>
        </div>
      </div>
      <span class="gauge-label">Temperature</span>
    </div>

    <!-- CO2 PRESSURE -->
    <div class="gauge-wrap">
      <div class="gauge-ring">
        <svg viewBox="0 0 100 100">
          <g transform="translate(50,50)">
            <line class="g-tick" x1="0" y1="-46" x2="0" y2="-40" transform="rotate(-135)"/>
            <line class="g-tick" x1="0" y1="-46" x2="0" y2="-42" transform="rotate(-90)"/>
            <line class="g-tick" x1="0" y1="-46" x2="0" y2="-40" transform="rotate(-45)"/>
            <line class="g-tick" x1="0" y1="-46" x2="0" y2="-42" transform="rotate(0)"/>
            <line class="g-tick" x1="0" y1="-46" x2="0" y2="-40" transform="rotate(45)"/>
          </g>
          <circle class="g-bg" cx="50" cy="50" r="42"/>
          <circle class="g-track" cx="50" cy="50" r="42"
            stroke-dasharray="220 659"
            stroke-dashoffset="-110"/>
          <circle class="g-fill" id="gFillCo2" cx="50" cy="50" r="42"
            stroke="#38bdf8"
            stroke-dashoffset="-110"/>
        </svg>
        <div class="gauge-center">
          <span class="gauge-value" id="gValCo2" style="color:#38bdf8; text-shadow:0 0 30px rgba(56,189,248,0.6)">0.0</span>
          <span class="gauge-unit">PSI</span>
        </div>
      </div>
      <span class="gauge-label">CO₂ Pressure</span>
    </div>

  </div>

  <!-- BEER LEVEL COLUMN -->
  <div class="level-section">
    <div class="level-header">Beer Remaining</div>

    <div class="level-frame" id="levelFrame">
      <div class="level-casing"></div>
      <div class="level-track">
        <div class="level-fill" id="levelFill" style="height:0%">
          <div class="wave-overlay"></div>
        </div>
        <div class="bubble-layer" id="bubbleLayer"></div>
      </div>

      <!-- Tick marks -->
      <div class="level-ticks">
        <div class="tick major"><div class="tick-line"></div>100%</div>
        <div class="tick"><div class="tick-line"></div>75%</div>
        <div class="tick major"><div class="tick-line"></div>50%</div>
        <div class="tick"><div class="tick-line"></div>25%</div>
        <div class="tick major"><div class="tick-line"></div>0%</div>
      </div>

      <!-- Floating % -->
      <div class="pct-indicator" id="pctIndicator" style="top:100%; color:#f59e0b">0%</div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div id="beerLogo" class="beer-logo">🍺</div>
    <div class="pints-row">
      <span class="pints-val" id="pintsVal">--</span>
      <span class="pints-lbl">pints left</span>
    </div>
  </div>

</div>

<script>
  const params     = new URLSearchParams(window.location.search);
  const DISPLAY_ID = window.location.pathname.split('/').pop();

  let lastTemp    = null;
  let curLevel    = 0;
  let flowActive  = false;

  /* ── Gauge arc helper ── */
  // Gauge uses a 270° sweep (from -135° to +135°).
  // Circumference of r=42: 2π*42 ≈ 263.9
  // 270° of that = 263.9 * 0.75 ≈ 197.9
  const CIRC = 2 * Math.PI * 42;
  const ARC  = CIRC * 0.75;

  function setGaugeFill(id, value, min, max) {
    const pct = Math.min(Math.max((value - min) / (max - min), 0), 1);
    const dash = pct * ARC;
    document.getElementById(id).style.strokeDasharray = `${dash} ${CIRC}`;
  }

  /* ── Update UI ── */
  function updateVisuals(k) {
    const name  = k.beer_name        || 'EMPTY TAP';
    const pct   = k.remaining_pct    || 0;
    const temp  = k.current_temp     || 0;
    const co2   = k.current_co2      || 0;
    const flow  = k.current_flow     || 0;
    const logo  = k.library_logo     || k.logo_path || null;

    curLevel   = pct;
    flowActive = flow > 0;

    /* Name */
    document.getElementById('txtName').textContent = name;

    /* Logo */
    document.getElementById('beerLogo').innerHTML = logo
      ? `<img src="${logo}" style="height:70px;object-fit:contain;filter:drop-shadow(0 0 16px rgba(245,158,11,0.5))">`
      : '🍺';

    /* Pints */
    const pints = Math.floor((pct / 100) * 88);
    document.getElementById('pintsVal').textContent = pints;

    /* Temperature gauge */
    setGaugeFill('gFillTemp', temp, 0, 20);
    document.getElementById('gValTemp').textContent = temp.toFixed(1);

    /* CO2 gauge */
    setGaugeFill('gFillCo2', co2, 0, 30);
    document.getElementById('gValCo2').textContent = co2.toFixed(1);

    /* Level bar */
    const fill = document.getElementById('levelFill');
    fill.style.height = pct + '%';

    /* Floating % label — top = 100% - pct% from bottom */
    const pctEl = document.getElementById('pctIndicator');
    pctEl.style.top   = (100 - pct) + '%';
    pctEl.textContent = Math.round(pct) + '%';

    /* Level state */
    const frame = document.getElementById('levelFrame');
    frame.className = 'level-frame';
    if (pct < 15)      frame.classList.add('level--crit');
    else if (pct < 30) frame.classList.add('level--low');
    else               frame.classList.add('level--ok');

    if (flowActive) frame.classList.add('pouring');

    /* Gauge colour on warning */
    const tempEl = document.getElementById('gValTemp');
    if (temp > 8) {
      tempEl.style.color      = '#ef4444';
      tempEl.style.textShadow = '0 0 30px rgba(239,68,68,0.7)';
      document.getElementById('gFillTemp').style.stroke = '#ef4444';
    } else {
      tempEl.style.color      = '#f59e0b';
      tempEl.style.textShadow = '0 0 30px rgba(245,158,11,0.6)';
      document.getElementById('gFillTemp').style.stroke = '#f59e0b';
    }

    pctEl.style.color = pct < 15 ? '#ef4444' : pct < 30 ? '#f97316' : '#f59e0b';

    /* Status pill */
    const pill = document.getElementById('txtStatus');
    if (flow > 0) {
      pill.textContent   = '⚡ POURING NOW';
      pill.style.color   = '#22c55e';
    } else if (pct < 15) {
      pill.textContent   = '🔴 KEG CRITICAL';
      pill.style.color   = '#ef4444';
    } else if (pct < 30) {
      pill.textContent   = '🟠 KEG RUNNING LOW';
      pill.style.color   = '#f97316';
    } else if (temp > 8) {
      pill.textContent   = '🌡 TEMP WARNING';
      pill.style.color   = '#f59e0b';
    } else {
      pill.textContent   = '✅ STABLE';
      pill.style.color   = 'rgba(255,255,255,0.4)';
    }

    /* Alert overlay */
    document.getElementById('alertOverlay').classList.toggle('show', pct < 15);
  }

  /* ── Bubble particle system ── */
  function spawnBubble() {
    if (curLevel < 3) return;
    const layer  = document.getElementById('bubbleLayer');
    const b      = document.createElement('div');
    const size   = 3 + Math.random() * 6;
    const left   = 10 + Math.random() * 80;
    const dur    = 3 + Math.random() * 4 + (flowActive ? -1 : 0);

    b.className = 'bubble';
    b.style.cssText = `
      width:${size}px; height:${size}px;
      left:${left}%; bottom:0%;
      animation-duration:${dur}s;
      animation-delay:${Math.random() * 2}s;
    `;
    layer.appendChild(b);
    setTimeout(() => b.remove(), (dur + 2) * 1000);
  }
  setInterval(spawnBubble, 600);

  /* ── SSE Stream ── */
  function initStream() {
    const es = new EventSource(`/api/mqtt/stream`);
    es.onmessage = e => {
      try {
        const msg = JSON.parse(e.data);
        const topic = `keghero/display/${DISPLAY_ID}/kegs`;
        if (msg.topic === topic) updateVisuals(msg.payload);
      } catch {}
    };
    es.onerror = () => setTimeout(initStream, 3000);
  }
  initStream();

  /* ── Demo Mode ── */
  if (params.get('demo') === 'true') {
    let demoPct  = 78;
    let demoTemp = 4.2;
    let demoCo2  = 14.5;

    updateVisuals({
      beer_name: 'DEMO BREW PRO',
      remaining_pct: demoPct,
      current_temp: demoTemp,
      current_co2: demoCo2,
      current_flow: 0
    });

    setInterval(() => {
      demoPct  = Math.max(0, demoPct - 0.15);
      demoTemp += (Math.random() - 0.5) * 0.3;
      demoCo2  += (Math.random() - 0.5) * 0.2;
      demoCo2   = Math.max(10, Math.min(20, demoCo2));
      demoTemp  = Math.max(2, Math.min(12, demoTemp));

      updateVisuals({
        beer_name: 'DEMO BREW PRO',
        remaining_pct: demoPct,
        current_temp: demoTemp,
        current_co2: demoCo2,
        current_flow: Math.random() > 0.85 ? 1.5 : 0
      });
    }, 2500);
  }

  /* ── Test Level ── */
  const testLevel = params.get('testLevel');
  if (testLevel !== null) {
    updateVisuals({
      beer_name: 'TEST MODE',
      remaining_pct: parseFloat(testLevel),
      current_temp: 4.2,
      current_co2: 14.5,
      current_flow: 0
    });
  }
</script>
</body>
</html>
