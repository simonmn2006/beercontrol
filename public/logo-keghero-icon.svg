<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdb827"/>
      <stop offset="100%" style="stop-color:#d4700a"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1c20"/>
      <stop offset="50%" style="stop-color:#2a2e36"/>
      <stop offset="100%" style="stop-color:#1a1c20"/>
    </linearGradient>
  </defs>
  <!-- Keg body -->
  <rect x="18" y="15" width="28" height="34" rx="4" fill="url(#g2)" stroke="#3a3f50" stroke-width="1"/>
  <!-- Top cap -->
  <rect x="14" y="12" width="36" height="6" rx="3" fill="url(#g1)"/>
  <!-- Bottom cap -->
  <rect x="14" y="46" width="36" height="6" rx="3" fill="url(#g1)"/>
  <!-- Rings -->
  <rect x="18" y="22" width="28" height="2.5" rx="1" fill="#3a3f50"/>
  <rect x="18" y="39" width="28" height="2.5" rx="1" fill="#3a3f50"/>
  <!-- Lightning bolt -->
  <polygon points="35,14 30,27 34,27 27,50 40,32 35,32 42,14" fill="url(#g1)"/>
</svg>
