name: beer_dashboard
description: High-performance Flutter dashboard for KegHero on RPi 4.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  mqtt_client: ^10.0.0
  provider: ^6.0.5
  google_fonts: ^6.1.0
  flutter_shaders: ^0.1.1
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - shaders/
